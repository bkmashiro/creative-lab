<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#043 Wave Equation — creative-lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0e8ff}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:16px;left:16px;z-index:10;background:rgba(0,0,0,0.68);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;min-width:230px;font-size:0.82rem}
h1{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#6a7a9a;margin-bottom:11px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row label{width:80px;color:#c0c8e0;flex-shrink:0;font-size:0.78rem}
.row input[type=range]{flex:1;accent-color:#00d4ff;cursor:pointer}
.val{width:36px;text-align:right;color:#00ccee;font-size:0.74rem;font-variant-numeric:tabular-nums}
.sep{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:8px 0}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
button{background:rgba(0,200,255,0.09);border:1px solid rgba(0,200,255,0.2);color:#66ccee;border-radius:6px;padding:5px 9px;font-size:0.72rem;cursor:pointer;transition:background .15s}
button:hover{background:rgba(0,200,255,0.2)}
button.active{background:rgba(0,200,255,0.28);border-color:rgba(0,200,255,0.55);color:#00eeff}
.eq{font-size:0.67rem;color:#3d5470;line-height:1.7;margin-top:4px}
#hint{position:fixed;bottom:14px;left:16px;color:rgba(180,210,255,0.28);font-size:0.7rem}
footer{position:fixed;bottom:12px;right:16px;color:rgba(255,255,255,0.2);font-size:0.7rem}
footer a{color:rgba(255,255,255,0.28);text-decoration:none}
footer a:hover{color:rgba(255,255,255,0.55)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>043 · Wave Equation</h1>
  <div class="row"><label>Speed c²</label><input type="range" id="s-speed" min="0.05" max="0.49" step="0.01" value="0.30"><span class="val" id="v-speed">0.30</span></div>
  <div class="row"><label>Damping</label><input type="range" id="s-damp" min="0.990" max="0.9995" step="0.0005" value="0.997"><span class="val" id="v-damp">0.997</span></div>
  <div class="row"><label>Drop size</label><input type="range" id="s-rad" min="0.01" max="0.12" step="0.005" value="0.04"><span class="val" id="v-rad">0.04</span></div>
  <div class="row"><label>Brightness</label><input type="range" id="s-amp" min="1" max="12" step="0.5" value="5"><span class="val" id="v-amp">5.0</span></div>
  <hr class="sep">
  <div class="btn-row">
    <button id="btn-drop">Drop</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-pause">Pause</button>
  </div>
  <div class="btn-row">
    <button id="btn-slit" class="active">Two Slits</button>
    <button id="btn-osc">Oscillator</button>
    <button id="btn-absorb" class="active">Absorbing</button>
  </div>
  <div class="eq">
    ∂²u/∂t² = c²∇²u<br>
    Finite differences · 512² grid<br>
    Drag to create waves
  </div>
</div>
<div id="hint">Click / drag to splash · Two-slit interference on by default</div>
<footer><a href="https://github.com/bkmashiro/creative-lab">creative-lab</a> · demo 043</footer>
<script>
'use strict';
const canvas = document.getElementById('c');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

const gl = canvas.getContext('webgl2', {antialias:false, preserveDrawingBuffer:false});
if (!gl) { document.body.innerHTML='<p style="color:#f88;padding:2em">WebGL2 required.</p>'; throw 0; }
if (!gl.getExtension('EXT_color_buffer_float')) { document.body.innerHTML='<p style="color:#f88;padding:2em">EXT_color_buffer_float not available.</p>'; throw 0; }

const SIM = 512;
const TEX = 1.0 / SIM;

// ── Params ─────────────────────────────────────────────────────────────────
const P = {
  speed: 0.30,
  damp: 0.997,
  radius: 0.04,
  brightness: 5.0,
  twoSlit: true,
  oscillator: false,
  absorbing: true,
  paused: false
};

// ── Shader sources ──────────────────────────────────────────────────────────
const VERT = `#version 300 es
layout(location=0) in vec2 aPos;
out vec2 vUV;
void main(){ vUV=aPos*.5+.5; gl_Position=vec4(aPos,0.,1.); }`;

// Simulation: 2D wave equation with optional absorbing boundaries & point sources
const FRAG_SIM = `#version 300 es
precision highp float;
in vec2 vUV;
uniform sampler2D uCurr, uPrev;
uniform float uC;         // c² (stability: c <= 1/sqrt(2))
uniform float uDamp;      // global damping per step
uniform float uTime;      // time in seconds
uniform float uAbsorb;    // 0 = reflective, 1 = absorbing
uniform float uAbsW;      // absorbing zone width fraction
// Point sources: up to 4, packed as vec4(x, y, freq, amp)
uniform vec4 uSrc0, uSrc1, uSrc2, uSrc3;
uniform int uNumSrc;
// Mouse disturbance
uniform vec2 uMouseUV;
uniform float uMouseR;
uniform float uMouseOn;
out float outH;

float srcSample(vec4 s, vec2 uv, float t) {
  float dist = distance(uv, s.xy);
  float sigma = 2.0 * 1.0/512.0;
  return s.w * exp(-dist*dist/(2.0*sigma*sigma)) * sin(t * s.z);
}

void main() {
  vec2 uv = vUV;
  float curr = texture(uCurr, uv).r;
  float prev = texture(uPrev, uv).r;

  // Laplacian (5-point stencil)
  float l = texture(uCurr, uv + vec2(-1.0/512.0, 0.0)).r;
  float r = texture(uCurr, uv + vec2( 1.0/512.0, 0.0)).r;
  float u = texture(uCurr, uv + vec2(0.0,  1.0/512.0)).r;
  float d = texture(uCurr, uv + vec2(0.0, -1.0/512.0)).r;
  float lap = l + r + u + d - 4.0 * curr;

  float next = 2.0*curr - prev + uC * lap;

  // Global damping
  next *= uDamp;

  // Absorbing boundary layer (extra exponential damping near edges)
  if (uAbsorb > 0.5) {
    float w = uAbsW;
    float px = min(uv.x, 1.0 - uv.x) / w;
    float py = min(uv.y, 1.0 - uv.y) / w;
    float p = clamp(min(px, py), 0.0, 1.0);
    // Strong damping: 0 at edge → 1 at interior boundary
    float extra = mix(0.65, 1.0, p * p);
    next *= extra;
  }

  // Inject point sources (hard source = override value at source pixel)
  // Use a tiny gaussian so it covers a few pixels
  bool srcApplied = false;
  if (uNumSrc > 0) {
    float dist0 = distance(uv, uSrc0.xy);
    if (dist0 < 3.0/512.0) { next = uSrc0.w * sin(uTime * uSrc0.z); srcApplied = true; }
  }
  if (!srcApplied && uNumSrc > 1) {
    float dist1 = distance(uv, uSrc1.xy);
    if (dist1 < 3.0/512.0) { next = uSrc1.w * sin(uTime * uSrc1.z); srcApplied = true; }
  }
  if (!srcApplied && uNumSrc > 2) {
    float dist2 = distance(uv, uSrc2.xy);
    if (dist2 < 3.0/512.0) { next = uSrc2.w * sin(uTime * uSrc2.z); srcApplied = true; }
  }
  if (!srcApplied && uNumSrc > 3) {
    float dist3 = distance(uv, uSrc3.xy);
    if (dist3 < 3.0/512.0) { next = uSrc3.w * sin(uTime * uSrc3.z); }
  }

  // Mouse splash
  if (uMouseOn > 0.5) {
    float md = distance(uv, uMouseUV);
    if (md < uMouseR) {
      float f = 1.0 - md / uMouseR;
      next += 0.8 * f * f;
    }
  }

  outH = clamp(next, -1.5, 1.5);
}`;

// Render: map height field to beautiful colors
const FRAG_RENDER = `#version 300 es
precision highp float;
in vec2 vUV;
uniform sampler2D uTex;
uniform float uBright; // amplitude scale factor
out vec4 outColor;

vec3 heightColor(float h) {
  float t = clamp(h * uBright, -1.0, 1.0);
  // Background: very dark ocean blue
  vec3 bg = vec3(0.01, 0.02, 0.06);
  if (t > 0.0) {
    // Positive: deep blue → cyan → white
    float e = 1.0 - exp(-t * 4.0);
    vec3 mid = vec3(0.0, 0.65, 1.0);
    vec3 peak = vec3(0.85, 0.97, 1.0);
    vec3 c = mix(bg, mid, e);
    c = mix(c, peak, e * e * e);
    return c;
  } else {
    // Negative: background → deep indigo/purple
    float e = 1.0 - exp(t * 4.0); // t<0 so t*4<0 → exp positive → 1-exp<0? no
    // t is negative, so -t is positive
    float ne = 1.0 - exp(-(-t) * 4.0);
    vec3 trough = vec3(0.18, 0.0, 0.38);
    return mix(bg, trough, ne * 0.7);
  }
}

void main() {
  float h = texture(uTex, vUV).r;
  vec3 col = heightColor(h);

  // Subtle vignette
  vec2 cUV = vUV * 2.0 - 1.0;
  float vig = 1.0 - dot(cUV, cUV) * 0.15;
  col *= vig;

  outColor = vec4(col, 1.0);
}`;

// ── GL helpers ──────────────────────────────────────────────────────────────
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function link(vert, frag) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vert));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}
function makeTexFBO(size) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, size, size, 0, gl.RED, gl.FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo};
}
function uni(prog, name) { return gl.getUniformLocation(prog, name); }

// ── Geometry: fullscreen quad ───────────────────────────────────────────────
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

// ── Programs ────────────────────────────────────────────────────────────────
const simProg    = link(VERT, FRAG_SIM);
const renderProg = link(VERT, FRAG_RENDER);

// ── Textures & FBOs (3 for ping-pong: prev, curr, next) ─────────────────────
const bufs = [makeTexFBO(SIM), makeTexFBO(SIM), makeTexFBO(SIM)];
let idx = { prev:0, curr:1, next:2 };

function clearAll() {
  const zero = new Float32Array(SIM * SIM).fill(0);
  for (const b of bufs) {
    gl.bindTexture(gl.TEXTURE_2D, b.tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, SIM, SIM, 0, gl.RED, gl.FLOAT, zero);
  }
}
clearAll();

// ── Mouse state ──────────────────────────────────────────────────────────────
const mouse = { uv:[0,0], on:false, prev:[0,0] };

canvas.addEventListener('mousedown', e => {
  mouse.on = true;
  updateMouse(e);
});
canvas.addEventListener('mousemove', e => {
  if (mouse.on) updateMouse(e);
});
canvas.addEventListener('mouseup', () => { mouse.on = false; });
canvas.addEventListener('mouseleave', () => { mouse.on = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.on = true;
  const t = e.touches[0];
  updateMouseXY(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateMouseXY(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchend', () => { mouse.on = false; });

function updateMouse(e) { updateMouseXY(e.clientX, e.clientY); }
function updateMouseXY(cx, cy) {
  mouse.uv[0] = cx / window.innerWidth;
  mouse.uv[1] = 1.0 - cy / window.innerHeight;
}

// ── Drop: inject Gaussian splash at center ──────────────────────────────────
let pendingDrop = null;
function dropAt(uvx, uvy) {
  pendingDrop = {x: uvx, y: uvy};
}

// ── Source definitions ───────────────────────────────────────────────────────
// Each source: [uvx, uvy, freq (rad/s), amplitude]
function getSources() {
  const srcs = [];
  if (P.twoSlit) {
    // Two sources for double-slit interference — left side, two vertical positions
    srcs.push([0.15, 0.38, 18.0, 1.0]);
    srcs.push([0.15, 0.62, 18.0, 1.0]);
  }
  if (P.oscillator) {
    // Single oscillator in the middle
    srcs.push([0.5, 0.5, 12.0, 0.9]);
  }
  return srcs.slice(0, 4);
}

// ── Simulation step ──────────────────────────────────────────────────────────
function simStep(t) {
  const prog = simProg;
  gl.useProgram(prog);
  gl.bindVertexArray(vao);
  gl.viewport(0, 0, SIM, SIM);
  gl.bindFramebuffer(gl.FRAMEBUFFER, bufs[idx.next].fbo);

  // Bind textures
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bufs[idx.curr].tex);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, bufs[idx.prev].tex);
  gl.uniform1i(uni(prog,'uCurr'), 0);
  gl.uniform1i(uni(prog,'uPrev'), 1);
  gl.uniform1f(uni(prog,'uC'), P.speed);
  gl.uniform1f(uni(prog,'uDamp'), P.damp);
  gl.uniform1f(uni(prog,'uTime'), t);
  gl.uniform1f(uni(prog,'uAbsorb'), P.absorbing ? 1.0 : 0.0);
  gl.uniform1f(uni(prog,'uAbsW'), 0.06); // 6% absorbing zone

  // Sources
  const srcs = getSources();
  gl.uniform1i(uni(prog,'uNumSrc'), srcs.length);
  const defaults = [0,0,0,0];
  const [s0,s1,s2,s3] = [srcs[0]||defaults, srcs[1]||defaults, srcs[2]||defaults, srcs[3]||defaults];
  gl.uniform4f(uni(prog,'uSrc0'), s0[0], s0[1], s0[2], s0[3]);
  gl.uniform4f(uni(prog,'uSrc1'), s1[0], s1[1], s1[2], s1[3]);
  gl.uniform4f(uni(prog,'uSrc2'), s2[0], s2[1], s2[2], s2[3]);
  gl.uniform4f(uni(prog,'uSrc3'), s3[0], s3[1], s3[2], s3[3]);

  // Mouse
  gl.uniform2f(uni(prog,'uMouseUV'), mouse.uv[0], mouse.uv[1]);
  gl.uniform1f(uni(prog,'uMouseR'), P.radius);
  gl.uniform1f(uni(prog,'uMouseOn'), mouse.on ? 1.0 : 0.0);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // Inject drop: write a Gaussian pulse directly into the "next" texture
  if (pendingDrop) {
    injectDrop(pendingDrop.x, pendingDrop.y);
    pendingDrop = null;
  }

  // Rotate indices
  const tmp = idx.prev;
  idx.prev = idx.curr;
  idx.curr = idx.next;
  idx.next = tmp;

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

function injectDrop(uvx, uvy) {
  // Write a Gaussian pulse into the current "next" FBO texture via CPU upload
  // We generate a float array and sub-image update the texture
  const r = Math.ceil(P.radius * SIM);
  const cx = Math.round(uvx * SIM);
  const cy = Math.round(uvy * SIM);
  const size = (2*r+1);
  const data = new Float32Array(size * size);
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const d = Math.sqrt(dx*dx + dy*dy) / r;
      data[(dy+r)*size + (dx+r)] = Math.exp(-d*d * 4.0);
    }
  }
  gl.bindTexture(gl.TEXTURE_2D, bufs[idx.next].tex);
  gl.texSubImage2D(gl.TEXTURE_2D, 0,
    Math.max(0, cx - r), Math.max(0, cy - r),
    size, size, gl.RED, gl.FLOAT, data);
}

// ── Render to screen ─────────────────────────────────────────────────────────
function renderFrame() {
  gl.useProgram(renderProg);
  gl.bindVertexArray(vao);
  gl.viewport(0, 0, W, H);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bufs[idx.curr].tex);
  gl.uniform1i(uni(renderProg,'uTex'), 0);
  gl.uniform1f(uni(renderProg,'uBright'), P.brightness);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── Main loop ────────────────────────────────────────────────────────────────
let t0 = null;
function loop(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) * 0.001;
  if (!P.paused) {
    // Multiple substeps per frame for stability at high speed
    const steps = 3;
    for (let i = 0; i < steps; i++) {
      simStep(t + i * (1/60/steps));
    }
  }
  renderFrame();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ── UI controls ──────────────────────────────────────────────────────────────
function bindSlider(id, valId, key, fmt) {
  const sl = document.getElementById(id);
  const sp = document.getElementById(valId);
  sl.addEventListener('input', () => {
    P[key] = parseFloat(sl.value);
    sp.textContent = fmt ? fmt(P[key]) : P[key].toFixed(2);
  });
}
bindSlider('s-speed', 'v-speed', 'speed');
bindSlider('s-damp',  'v-damp',  'damp',  v => v.toFixed(4));
bindSlider('s-rad',   'v-rad',   'radius');
bindSlider('s-amp',   'v-amp',   'brightness', v => v.toFixed(1));

document.getElementById('btn-drop').addEventListener('click', () => {
  dropAt(0.5, 0.5);
});
document.getElementById('btn-clear').addEventListener('click', () => {
  clearAll();
});

const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('click', () => {
  P.paused = !P.paused;
  btnPause.classList.toggle('active', P.paused);
  btnPause.textContent = P.paused ? 'Resume' : 'Pause';
});

const btnSlit = document.getElementById('btn-slit');
btnSlit.addEventListener('click', () => {
  P.twoSlit = !P.twoSlit;
  btnSlit.classList.toggle('active', P.twoSlit);
  if (P.twoSlit) { P.oscillator = false; document.getElementById('btn-osc').classList.remove('active'); }
  clearAll();
});

const btnOsc = document.getElementById('btn-osc');
btnOsc.addEventListener('click', () => {
  P.oscillator = !P.oscillator;
  btnOsc.classList.toggle('active', P.oscillator);
  if (P.oscillator) { P.twoSlit = false; btnSlit.classList.remove('active'); }
  clearAll();
});

const btnAbsorb = document.getElementById('btn-absorb');
btnAbsorb.addEventListener('click', () => {
  P.absorbing = !P.absorbing;
  btnAbsorb.classList.toggle('active', P.absorbing);
});

// Click anywhere on canvas to drop
canvas.addEventListener('click', e => {
  const uvx = e.clientX / window.innerWidth;
  const uvy = 1.0 - e.clientY / window.innerHeight;
  if (!mouse.on) dropAt(uvx, uvy);
});
</script>
</body>
</html>
