<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#051 Cellular Noise — creative-lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060810;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#dde6f0}
canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0}
#ui{position:fixed;top:16px;left:16px;z-index:10;background:rgba(6,8,16,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(120,200,255,0.13);border-radius:12px;padding:14px 16px;min-width:250px;font-size:0.82rem}
h1{font-size:0.7rem;letter-spacing:0.13em;text-transform:uppercase;color:#3a6a8a;margin-bottom:11px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row label{width:110px;color:#90b0c8;flex-shrink:0;font-size:0.78rem}
.row input[type=range]{flex:1;accent-color:#5ec8ff;cursor:pointer}
.val{width:40px;text-align:right;color:#5ec8ff;font-size:0.74rem;font-variant-numeric:tabular-nums}
.section{font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;color:#2e5570;margin:9px 0 4px;border-top:1px solid rgba(120,200,255,0.07);padding-top:7px}
select{background:rgba(6,8,16,0.9);border:1px solid rgba(120,200,255,0.2);color:#5ec8ff;border-radius:6px;padding:3px 6px;font-size:0.76rem;cursor:pointer;width:100%}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.check-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.check-row input{accent-color:#5ec8ff;cursor:pointer;width:13px;height:13px}
.check-row span{color:#90b0c8;font-size:0.78rem}
.btn-row{display:flex;gap:5px;margin-top:9px}
button{flex:1;background:rgba(94,200,255,0.07);border:1px solid rgba(94,200,255,0.18);color:#5ec8ff;border-radius:6px;padding:5px 4px;font-size:0.74rem;cursor:pointer;transition:background .15s}
button:hover{background:rgba(94,200,255,0.18)}
#fps{position:fixed;top:16px;right:16px;z-index:10;background:rgba(6,8,16,0.78);backdrop-filter:blur(10px);border:1px solid rgba(120,200,255,0.09);border-radius:10px;padding:8px 14px;font-size:0.74rem;color:#5a7a8a;text-align:right;line-height:1.8}
#fps span{color:#8ec0d8;font-variant-numeric:tabular-nums}
footer{position:fixed;bottom:12px;right:16px;color:rgba(255,255,255,0.18);font-size:0.7rem}
footer a{color:rgba(255,255,255,0.26);text-decoration:none}
footer a:hover{color:rgba(255,255,255,0.52)}
#hint{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);color:rgba(140,200,255,0.18);font-size:0.7rem;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h1>051 · Cellular Noise</h1>

  <div class="section">Noise Mode</div>
  <div class="row"><label>Function</label>
    <select id="sel-fn">
      <option value="0">F1 (nearest)</option>
      <option value="1">F2 (2nd nearest)</option>
      <option value="2" selected>F2 − F1 (border)</option>
      <option value="3">Cell ID (Voronoi)</option>
      <option value="4">F1 + F2 (ridged)</option>
      <option value="5">sin(F1·π) (rings)</option>
    </select>
  </div>
  <div class="row"><label>Distance</label>
    <select id="sel-dist">
      <option value="0" selected>Euclidean</option>
      <option value="1">Manhattan</option>
      <option value="2">Chebyshev</option>
      <option value="3">Minkowski p=0.5</option>
    </select>
  </div>

  <div class="section">Structure</div>
  <div class="row"><label>Cell count</label><input type="range" id="s-cells" min="2" max="40" step="1" value="10"><span class="val" id="v-cells">10</span></div>
  <div class="row"><label>Jitter</label><input type="range" id="s-jitter" min="0" max="100" value="100"><span class="val" id="v-jitter">1.00</span></div>

  <div class="section">Colour</div>
  <div class="row"><label>Palette</label>
    <select id="sel-pal">
      <option value="0" selected>Bio (cyan/green)</option>
      <option value="1">Lava</option>
      <option value="2">Ice</option>
      <option value="3">Gold</option>
      <option value="4">Greyscale</option>
      <option value="5">Rainbow</option>
    </select>
  </div>
  <div class="row"><label>Contrast</label><input type="range" id="s-contrast" min="50" max="400" value="140"><span class="val" id="v-contrast">1.40</span></div>

  <div class="section">Animation</div>
  <div class="row"><label>Speed</label><input type="range" id="s-speed" min="0" max="100" value="20"><span class="val" id="v-speed">0.20</span></div>
  <div class="row"><label>Wave amp</label><input type="range" id="s-wave" min="0" max="100" value="30"><span class="val" id="v-wave">0.30</span></div>

  <div class="check-row"><label><input type="checkbox" id="cb-tile"> <span>Show grid</span></label></div>
  <div class="check-row"><label><input type="checkbox" id="cb-invert"> <span>Invert</span></label></div>

  <div class="btn-row">
    <button id="btn-pause">Pause</button>
    <button id="btn-mouse">Mouse off</button>
  </div>
</div>

<div id="fps">FPS <span id="st-fps">-</span></div>
<div id="hint">Move mouse to attract cells · Scroll to zoom</div>
<footer><a href="https://github.com/bkmashiro/creative-lab">creative-lab</a> · demo 051</footer>

<script>
// ── WebGL setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL not supported</p>'; }

const VS = `#version 100
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos,0.,1.); }`;

const FS = `#version 100
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform float u_cells;
uniform float u_jitter;
uniform float u_speed;
uniform float u_wave;
uniform float u_contrast;
uniform float u_zoom;
uniform vec2  u_mouse;
uniform int   u_fn;
uniform int   u_dist;
uniform int   u_pal;
uniform bool  u_tile;
uniform bool  u_invert;
uniform bool  u_mouse_on;

// ── Hash ──────────────────────────────────────────────────────────────────────
vec2 hash2(vec2 p){
  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
  return fract(sin(p)*43758.5453123);
}

// ── Distance metric ───────────────────────────────────────────────────────────
float dist(vec2 a, vec2 b){
  vec2 d = abs(a-b);
  if(u_dist == 0) return length(d);
  if(u_dist == 1) return d.x+d.y;
  if(u_dist == 2) return max(d.x,d.y);
  // Minkowski p=0.5: (sqrt(|x|)+sqrt(|y|))^2
  float s = sqrt(d.x)+sqrt(d.y);
  return s*s;
}

// ── Cellular noise ────────────────────────────────────────────────────────────
// Returns vec3(F1, F2, cell_id_hash)
vec3 cellular(vec2 uv){
  vec2 cell = floor(uv);
  vec2 frac = fract(uv);
  float t = u_time * u_speed;

  float F1 = 1e9, F2 = 1e9;
  float cid = 0.0;
  vec2 cid_v = vec2(0.);

  for(int dy=-2; dy<=2; dy++){
    for(int dx=-2; dx<=2; dx++){
      vec2 nb = vec2(float(dx), float(dy));
      vec2 key = cell + nb;
      vec2 h = hash2(key);
      // Animate feature points with sinusoidal motion
      vec2 pt = nb + u_jitter * (h - 0.5) * 2.0;
      pt += u_wave * sin(2.3*t*vec2(h.y,-h.x) + 6.2832*h);
      // Mouse attraction
      if(u_mouse_on){
        vec2 world_mouse = u_mouse * u_cells;
        float pull = 0.4 / (1.0 + 0.3*dist(uv + pt - frac, world_mouse));
        pt = mix(pt, world_mouse - cell, pull);
      }
      float d = dist(frac - pt, vec2(0.));
      if(d < F1){
        F2  = F1; F1 = d;
        cid_v = key;
      } else if(d < F2){
        F2 = d;
      }
    }
  }
  cid = fract(dot(hash2(cid_v), vec2(1.0, 7.3)));
  return vec3(F1, F2, cid);
}

// ── Palette ───────────────────────────────────────────────────────────────────
vec3 palette(float t, int id){
  t = clamp(t, 0., 1.);
  if(id==0){ // Bio
    vec3 a=vec3(0.0,0.35,0.4), b=vec3(0.3,0.5,0.35), c=vec3(1.0,0.5,0.5), d=vec3(0.0,0.2,0.6);
    return a + b*cos(6.2832*(c*t+d));
  }
  if(id==1){ // Lava
    vec3 a=vec3(0.5,0.1,0.0), b=vec3(0.5,0.3,0.1), c=vec3(1.0,0.7,0.4), d=vec3(0.0,0.1,0.2);
    return a + b*cos(6.2832*(c*t+d));
  }
  if(id==2){ // Ice
    vec3 a=vec3(0.5,0.6,0.8), b=vec3(0.5,0.4,0.3), c=vec3(0.5,0.3,0.5), d=vec3(0.3,0.6,0.8);
    return a + b*cos(6.2832*(c*t+d));
  }
  if(id==3){ // Gold
    vec3 a=vec3(0.5,0.4,0.0), b=vec3(0.5,0.45,0.1), c=vec3(0.8,0.6,0.3), d=vec3(0.0,0.05,0.15);
    return a + b*cos(6.2832*(c*t+d));
  }
  if(id==4){ // Greyscale
    return vec3(t);
  }
  // Rainbow
  return 0.5 + 0.5*cos(6.2832*(t + vec3(0.,0.33,0.67)));
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_res.xy;
  uv.y = 1.0 - uv.y;
  // Aspect + zoom
  float aspect = u_res.x / u_res.y;
  uv = (uv - 0.5) / u_zoom + 0.5;
  uv.x *= aspect;
  uv *= u_cells;

  vec3 cell = cellular(uv);
  float F1 = cell.x, F2 = cell.y, cid = cell.z;

  // Select noise function
  float n;
  if(u_fn == 0) n = F1;
  else if(u_fn == 1) n = F2;
  else if(u_fn == 2) n = F2 - F1;
  else if(u_fn == 3) n = cid;
  else if(u_fn == 4) n = (F1 + F2) * 0.5;
  else               n = 0.5 + 0.5*sin(F1 * 3.14159 * 4.0);

  // Scale & contrast
  n = n * u_contrast;
  n = clamp(n, 0., 1.);
  if(u_invert) n = 1.0 - n;

  vec3 col = palette(n, u_pal);

  // Grid overlay
  if(u_tile){
    vec2 g = fract(uv);
    float line = 1.0 - smoothstep(0.0, 0.04, min(g.x, g.y));
    col = mix(col, vec3(0.6,0.8,1.0), line * 0.25);
  }

  // Subtle vignette
  vec2 vig = gl_FragCoord.xy / u_res - 0.5;
  float v = 1.0 - 0.6*dot(vig, vig);
  col *= v;

  gl_FragColor = vec4(col, 1.0);
}`;

function compile(gl, type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}
function link(gl, vs, fs){
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(p));
  return p;
}

const prog = link(gl, compile(gl, gl.VERTEX_SHADER, VS), compile(gl, gl.FRAGMENT_SHADER, FS));
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
gl.useProgram(prog);

const uloc = n => gl.getUniformLocation(prog, n);
const U = {
  res:      uloc('u_res'),
  time:     uloc('u_time'),
  cells:    uloc('u_cells'),
  jitter:   uloc('u_jitter'),
  speed:    uloc('u_speed'),
  wave:     uloc('u_wave'),
  contrast: uloc('u_contrast'),
  zoom:     uloc('u_zoom'),
  mouse:    uloc('u_mouse'),
  fn:       uloc('u_fn'),
  dist:     uloc('u_dist'),
  pal:      uloc('u_pal'),
  tile:     uloc('u_tile'),
  invert:   uloc('u_invert'),
  mouseOn:  uloc('u_mouse_on'),
};

// ── State ──────────────────────────────────────────────────────────────────────
let paused = false, mouseActive = true;
let t0 = performance.now(), tPause = 0, elapsed = 0;
let zoom = 1.0, mouse = [0.5, 0.5];

// ── Controls ───────────────────────────────────────────────────────────────────
function slider(id, valId, scale){
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  vl.textContent = (el.value*scale).toFixed(2);
  el.addEventListener('input', () => {
    vl.textContent = (el.value*scale).toFixed(scale===1?0:2);
  });
  return el;
}
const sCells    = slider('s-cells',    'v-cells',    1);
const sJitter   = slider('s-jitter',   'v-jitter',   0.01);
const sContrast = slider('s-contrast', 'v-contrast', 0.01);
const sSpeed    = slider('s-speed',    'v-speed',    0.01);
const sWave     = slider('s-wave',     'v-wave',     0.01);

const selFn   = document.getElementById('sel-fn');
const selDist = document.getElementById('sel-dist');
const selPal  = document.getElementById('sel-pal');
const cbTile  = document.getElementById('cb-tile');
const cbInvert= document.getElementById('cb-invert');

document.getElementById('btn-pause').addEventListener('click', function(){
  paused = !paused;
  if(paused){ tPause = performance.now(); }
  else { t0 += performance.now() - tPause; }
  this.textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('btn-mouse').addEventListener('click', function(){
  mouseActive = !mouseActive;
  this.textContent = mouseActive ? 'Mouse off' : 'Mouse on';
});

canvas.addEventListener('mousemove', e => {
  mouse = [e.clientX / window.innerWidth, 1 - e.clientY / window.innerHeight];
});
canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 1.1 : 0.9;
  zoom = Math.max(0.1, Math.min(10, zoom));
  e.preventDefault();
}, {passive: false});

// ── Resize ─────────────────────────────────────────────────────────────────────
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── FPS ────────────────────────────────────────────────────────────────────────
let frames=0, fpsT=performance.now();
const fpsEl = document.getElementById('st-fps');

// ── Render loop ────────────────────────────────────────────────────────────────
function render(now){
  requestAnimationFrame(render);
  if(!paused) elapsed = (now - t0) * 0.001;

  gl.uniform2f(U.res, canvas.width, canvas.height);
  gl.uniform1f(U.time,     elapsed);
  gl.uniform1f(U.cells,    parseFloat(sCells.value));
  gl.uniform1f(U.jitter,   parseFloat(sJitter.value)   * 0.01);
  gl.uniform1f(U.contrast, parseFloat(sContrast.value) * 0.01);
  gl.uniform1f(U.speed,    parseFloat(sSpeed.value)    * 0.01);
  gl.uniform1f(U.wave,     parseFloat(sWave.value)     * 0.01);
  gl.uniform1f(U.zoom,     zoom);
  gl.uniform2fv(U.mouse,   mouse);
  gl.uniform1i(U.fn,       parseInt(selFn.value));
  gl.uniform1i(U.dist,     parseInt(selDist.value));
  gl.uniform1i(U.pal,      parseInt(selPal.value));
  gl.uniform1i(U.tile,     cbTile.checked  ? 1 : 0);
  gl.uniform1i(U.invert,   cbInvert.checked ? 1 : 0);
  gl.uniform1i(U.mouseOn,  mouseActive ? 1 : 0);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // FPS
  frames++;
  if(now - fpsT >= 500){
    fpsEl.textContent = (frames * 1000 / (now - fpsT)).toFixed(0);
    frames = 0; fpsT = now;
  }
}
requestAnimationFrame(render);
</script>
</body>
</html>
