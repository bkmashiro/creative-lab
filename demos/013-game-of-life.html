<!-- TITLE: 013 Game of Life -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>013 — Game of Life · creative-lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 330px;
      max-width: calc(100vw - 32px);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.76);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.38);
      z-index: 2;
    }
    .panel h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .panel p,
    .panel label,
    .meta,
    input,
    select,
    button {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.8);
    }
    .controls {
      display: grid;
      grid-template-columns: 86px 1fr 54px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 10px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #7dd3fc;
    }
    select,
    button {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 10px;
      color: #f8fafc;
    }
    select {
      appearance: none;
    }
    button {
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease;
    }
    button:hover,
    select:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
    }
    .controls .span2 { grid-column: span 2; }
    .actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .meta {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .meta strong { color: #7dd3fc; font-weight: 500; }
    .footer {
      position: fixed;
      right: 16px;
      bottom: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      font-family: monospace;
      z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <h1>Conway Game of Life</h1>
  <p>Seed the grid by clicking and dragging. Cell color shifts through HSL as each survivor ages, while the simulation can be tuned live or paused for manual drawing.</p>
  <div class="controls">
    <label for="speed">Speed</label>
    <input id="speed" type="range" min="1" max="30" step="1" value="12">
    <span id="speedValue">12</span>

    <label for="gridSize">GridSize</label>
    <input id="gridSize" type="range" min="8" max="36" step="1" value="16">
    <span id="gridValue">16</span>

    <label for="theme">Theme</label>
    <select id="theme" class="span2">
      <option value="neon">Neon</option>
      <option value="ember">Ember</option>
      <option value="ocean">Ocean</option>
    </select>

    <div class="actions">
      <button id="clearBtn" type="button">Clear</button>
      <button id="randomBtn" type="button">Randomize</button>
      <button id="pauseBtn" type="button">Pause</button>
    </div>
  </div>
  <div class="meta">
    <span>Alive</span><strong id="aliveLabel">0</strong>
    <span>Generation</span><strong id="generationLabel">0</strong>
    <span>Density</span><strong id="densityLabel">0.00%</strong>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/bkmashiro/creative-lab">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com">cl.yuzhes.com</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const speedInput = document.getElementById('speed');
const gridSizeInput = document.getElementById('gridSize');
const themeSelect = document.getElementById('theme');
const clearBtn = document.getElementById('clearBtn');
const randomBtn = document.getElementById('randomBtn');
const pauseBtn = document.getElementById('pauseBtn');
const speedValue = document.getElementById('speedValue');
const gridValue = document.getElementById('gridValue');
const aliveLabel = document.getElementById('aliveLabel');
const generationLabel = document.getElementById('generationLabel');
const densityLabel = document.getElementById('densityLabel');

const themes = {
  neon: { hueA: 190, hueB: 320, bgA: '#05070d', bgB: '#111827', stroke: 'rgba(125, 211, 252, 0.08)' },
  ember: { hueA: 12, hueB: 58, bgA: '#090403', bgB: '#24120b', stroke: 'rgba(251, 191, 36, 0.08)' },
  ocean: { hueA: 170, hueB: 235, bgA: '#031014', bgB: '#0d1728', stroke: 'rgba(45, 212, 191, 0.08)' },
};

let width = 0;
let height = 0;
let dpr = 1;
let cols = 0;
let rows = 0;
let cellSize = Number(gridSizeInput.value);
let current = [];
let next = [];
let running = true;
let generation = 0;
let accumulator = 0;
let lastTime = performance.now();
const pointer = { down: false, value: 1 };

function createGrid(fill = 0) {
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rebuildGrid(true);
}

function rebuildGrid(preserve) {
  const previous = current;
  const oldCols = cols;
  const oldRows = rows;
  cellSize = Number(gridSizeInput.value);
  cols = Math.max(12, Math.floor(width / cellSize));
  rows = Math.max(12, Math.floor(height / cellSize));
  current = createGrid(0);
  next = createGrid(0);

  if (preserve && previous.length) {
    const minRows = Math.min(oldRows, rows);
    const minCols = Math.min(oldCols, cols);
    for (let y = 0; y < minRows; y++) {
      for (let x = 0; x < minCols; x++) {
        current[y][x] = previous[y][x];
      }
    }
  } else {
    generation = 0;
  }

  updateStats();
}

function clearGrid() {
  current = createGrid(0);
  next = createGrid(0);
  generation = 0;
  updateStats();
}

function randomizeGrid() {
  current = createGrid(0);
  next = createGrid(0);
  generation = 0;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      current[y][x] = Math.random() > 0.74 ? 1 : 0;
    }
  }
  updateStats();
}

function updateStats() {
  let alive = 0;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (current[y][x] > 0) alive++;
    }
  }
  const total = rows * cols || 1;
  aliveLabel.textContent = String(alive);
  generationLabel.textContent = String(generation);
  densityLabel.textContent = `${((alive / total) * 100).toFixed(2)}%`;
}

function stepSimulation() {
  let alive = 0;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      let neighbors = 0;
      for (let oy = -1; oy <= 1; oy++) {
        for (let ox = -1; ox <= 1; ox++) {
          if (ox === 0 && oy === 0) continue;
          const nx = (x + ox + cols) % cols;
          const ny = (y + oy + rows) % rows;
          neighbors += current[ny][nx] > 0 ? 1 : 0;
        }
      }

      const age = current[y][x];
      let nextAge = 0;
      if (age > 0 && (neighbors === 2 || neighbors === 3)) {
        nextAge = age + 1;
      } else if (age === 0 && neighbors === 3) {
        nextAge = 1;
      }
      next[y][x] = nextAge;
      if (nextAge > 0) alive++;
    }
  }

  const swap = current;
  current = next;
  next = swap;
  generation++;
  aliveLabel.textContent = String(alive);
  generationLabel.textContent = String(generation);
  densityLabel.textContent = `${((alive / Math.max(1, rows * cols)) * 100).toFixed(2)}%`;
}

function drawBackground() {
  const theme = themes[themeSelect.value];
  const gradient = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.max(width, height) * 0.75);
  gradient.addColorStop(0, theme.bgB);
  gradient.addColorStop(1, '#020202');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

function cellColor(age) {
  const theme = themes[themeSelect.value];
  const t = Math.min(1, age / 18);
  const hue = theme.hueA + (theme.hueB - theme.hueA) * t;
  const sat = 84 - t * 18;
  const light = 56 + Math.sin(age * 0.25) * 10 + t * 8;
  return `hsl(${hue.toFixed(1)} ${sat.toFixed(1)}% ${light.toFixed(1)}%)`;
}

function renderGrid() {
  const offsetX = (width - cols * cellSize) * 0.5;
  const offsetY = (height - rows * cellSize) * 0.5;
  const theme = themes[themeSelect.value];

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, 0, cols * cellSize, rows * cellSize);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const age = current[y][x];
      if (age <= 0) continue;
      const px = x * cellSize;
      const py = y * cellSize;
      ctx.fillStyle = cellColor(age);
      ctx.fillRect(px + 1, py + 1, Math.max(1, cellSize - 2), Math.max(1, cellSize - 2));
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(px + 1, py + 1, Math.max(1, cellSize - 2), Math.max(1, Math.min(3, cellSize * 0.14)));
    }
  }

  ctx.strokeStyle = theme.stroke;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= cols; x++) {
    const gx = x * cellSize + 0.5;
    ctx.moveTo(gx, 0);
    ctx.lineTo(gx, rows * cellSize);
  }
  for (let y = 0; y <= rows; y++) {
    const gy = y * cellSize + 0.5;
    ctx.moveTo(0, gy);
    ctx.lineTo(cols * cellSize, gy);
  }
  ctx.stroke();
  ctx.restore();
}

function paintFromPointer(event) {
  const rect = canvas.getBoundingClientRect();
  const offsetX = (width - cols * cellSize) * 0.5;
  const offsetY = (height - rows * cellSize) * 0.5;
  const x = Math.floor((event.clientX - rect.left - offsetX) / cellSize);
  const y = Math.floor((event.clientY - rect.top - offsetY) / cellSize);
  if (x < 0 || x >= cols || y < 0 || y >= rows) return;
  current[y][x] = pointer.value ? 1 : 0;
  updateStats();
}

function render(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  accumulator += dt;
  const stepInterval = 1 / Number(speedInput.value);

  if (running) {
    while (accumulator >= stepInterval) {
      stepSimulation();
      accumulator -= stepInterval;
    }
  } else {
    accumulator = 0;
  }

  drawBackground();
  renderGrid();
  requestAnimationFrame(render);
}

speedInput.addEventListener('input', () => {
  speedValue.textContent = speedInput.value;
});

gridSizeInput.addEventListener('input', () => {
  gridValue.textContent = gridSizeInput.value;
  rebuildGrid(false);
});

themeSelect.addEventListener('change', () => {
  drawBackground();
});

clearBtn.addEventListener('click', clearGrid);
randomBtn.addEventListener('click', randomizeGrid);
pauseBtn.addEventListener('click', () => {
  running = !running;
  pauseBtn.textContent = running ? 'Pause' : 'Resume';
});

canvas.addEventListener('pointerdown', event => {
  pointer.down = true;
  const rect = canvas.getBoundingClientRect();
  const offsetX = (width - cols * cellSize) * 0.5;
  const offsetY = (height - rows * cellSize) * 0.5;
  const x = Math.floor((event.clientX - rect.left - offsetX) / cellSize);
  const y = Math.floor((event.clientY - rect.top - offsetY) / cellSize);
  if (x >= 0 && x < cols && y >= 0 && y < rows) {
    pointer.value = current[y][x] > 0 ? 0 : 1;
    current[y][x] = pointer.value ? 1 : 0;
    updateStats();
  }
});

canvas.addEventListener('pointermove', event => {
  if (!pointer.down) return;
  paintFromPointer(event);
});

window.addEventListener('pointerup', () => {
  pointer.down = false;
});

window.addEventListener('resize', resize);

speedValue.textContent = speedInput.value;
gridValue.textContent = gridSizeInput.value;
resize();
randomizeGrid();
requestAnimationFrame(render);
</script>
</body>
</html>
