<!-- TITLE: 019 Artistic SVG Clock -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>019 — Artistic SVG Clock · creative-lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #06070b;
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    svg { display: block; width: 100%; height: 100%; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 336px;
      max-width: calc(100vw - 32px);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.76);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.38);
      z-index: 2;
    }
    .panel h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .panel p,
    .panel label,
    .panel select,
    .panel span,
    .panel input {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.84);
    }
    .controls {
      display: grid;
      grid-template-columns: 110px 1fr 52px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 10px;
    }
    select,
    input[type="color"] {
      width: 100%;
      min-height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #f8fafc;
      padding: 6px 8px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #7dd3fc;
      justify-self: start;
    }
    .meta {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .meta strong { color: #7dd3fc; font-weight: 500; }
    .digital {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(4, 8, 14, 0.46);
      backdrop-filter: blur(12px);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 14px;
      letter-spacing: 0.14em;
      color: rgba(248, 250, 252, 0.92);
      z-index: 2;
      pointer-events: none;
    }
    .digital.hidden { display: none; }
    .footer {
      position: fixed;
      right: 16px;
      bottom: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      font-family: monospace;
      z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
<svg id="scene" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" aria-label="Artistic SVG clock">
  <defs>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#152238"></stop>
      <stop offset="55%" stop-color="#090b12"></stop>
      <stop offset="100%" stop-color="#030406"></stop>
    </radialGradient>
  </defs>
  <rect id="background" width="1000" height="1000" fill="url(#bgGradient)"></rect>
  <g id="clockRoot" transform="translate(500 500)">
    <g id="halo"></g>
    <g id="ticks"></g>
    <path id="spiralPath" fill="none" stroke-linecap="round"></path>
    <g id="segments"></g>
    <g id="particles"></g>
    <g id="geometry"></g>
    <g id="hands" filter="url(#softGlow)">
      <line id="hourHand" x1="0" y1="0" x2="0" y2="-160" stroke-linecap="round"></line>
      <line id="minuteHand" x1="0" y1="0" x2="0" y2="-240" stroke-linecap="round"></line>
      <line id="secondHand" x1="0" y1="18" x2="0" y2="-290" stroke-linecap="round"></line>
    </g>
    <circle id="hub" r="10"></circle>
  </g>
</svg>

<div class="panel">
  <h1>Artistic SVG Clock</h1>
  <p>A live clock rendered as a shifting spiral, particle constellation, or morphing geometry. The second hand snaps with each tick while the rest of the scene eases continuously.</p>
  <div class="controls">
    <label for="style">Style</label>
    <select id="style">
      <option value="spiral">Fibonacci Spiral</option>
      <option value="particle">Particle Hands</option>
      <option value="geometry">Morphing Geometry</option>
    </select>
    <span id="styleValue">1</span>

    <label for="theme">Color theme</label>
    <select id="theme">
      <option value="aurora">Aurora</option>
      <option value="ember">Ember</option>
      <option value="mono">Monochrome</option>
      <option value="custom">Custom</option>
    </select>
    <span id="themeValue">A</span>

    <label for="accent">Accent</label>
    <input id="accent" type="color" value="#7dd3fc">
    <span id="accentValue">HEX</span>

    <label for="seconds">Show seconds</label>
    <input id="seconds" type="checkbox" checked>
    <span id="secondsValue">on</span>

    <label for="digital">Digital overlay</label>
    <input id="digital" type="checkbox" checked>
    <span id="digitalValue">on</span>
  </div>
  <div class="meta">
    <span>Time</span><strong id="timeLabel">00:00:00</strong>
    <span>Tick</span><strong id="tickLabel">0</strong>
    <span>Mode</span><strong id="modeLabel">spiral</strong>
  </div>
</div>

<div id="digitalOverlay" class="digital">00:00:00</div>

<div class="footer">
  <a href="https://github.com/bkmashiro/creative-lab">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com">cl.yuzhes.com</a>
</div>

<script>
const TAU = Math.PI * 2;
const GOLDEN = 1.61803398875;
const scene = document.getElementById('scene');
const background = document.getElementById('background');
const halo = document.getElementById('halo');
const ticks = document.getElementById('ticks');
const spiralPath = document.getElementById('spiralPath');
const segments = document.getElementById('segments');
const particlesGroup = document.getElementById('particles');
const geometry = document.getElementById('geometry');
const hourHand = document.getElementById('hourHand');
const minuteHand = document.getElementById('minuteHand');
const secondHand = document.getElementById('secondHand');
const hub = document.getElementById('hub');
const styleInput = document.getElementById('style');
const themeInput = document.getElementById('theme');
const accentInput = document.getElementById('accent');
const secondsInput = document.getElementById('seconds');
const digitalInput = document.getElementById('digital');
const styleValue = document.getElementById('styleValue');
const themeValue = document.getElementById('themeValue');
const accentValue = document.getElementById('accentValue');
const secondsValue = document.getElementById('secondsValue');
const digitalValue = document.getElementById('digitalValue');
const timeLabel = document.getElementById('timeLabel');
const tickLabel = document.getElementById('tickLabel');
const modeLabel = document.getElementById('modeLabel');
const digitalOverlay = document.getElementById('digitalOverlay');

const themes = {
  aurora: { bg0: '#152238', bg1: '#090b12', bg2: '#030406', accent: '#7dd3fc', accent2: '#a855f7', accent3: '#34d399' },
  ember: { bg0: '#36130d', bg1: '#12090b', bg2: '#040303', accent: '#fb7185', accent2: '#f59e0b', accent3: '#f97316' },
  mono: { bg0: '#17191c', bg1: '#090a0d', bg2: '#020304', accent: '#f8fafc', accent2: '#94a3b8', accent3: '#38bdf8' },
  custom: { bg0: '#112034', bg1: '#080b12', bg2: '#030406', accent: '#7dd3fc', accent2: '#a855f7', accent3: '#34d399' },
};

let tickMarks = [];
let particleNodes = [];
let lastSecond = -1;
let tickPulse = 0;
let width = window.innerWidth;
let height = window.innerHeight;

function polar(angle, radius) {
  return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function mixColor(hexA, hexB, t) {
  const a = hexToRgb(hexA);
  const b = hexToRgb(hexB);
  return rgbToHex(
    Math.round(lerp(a.r, b.r, t)),
    Math.round(lerp(a.g, b.g, t)),
    Math.round(lerp(a.b, b.b, t))
  );
}

function hexToRgb(hex) {
  const clean = hex.replace('#', '');
  const value = parseInt(clean, 16);
  return {
    r: (value >> 16) & 255,
    g: (value >> 8) & 255,
    b: value & 255,
  };
}

function rgbToHex(r, g, b) {
  return `#${[r, g, b].map(value => value.toString(16).padStart(2, '0')).join('')}`;
}

function rgba(hex, alpha) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildTicks() {
  ticks.innerHTML = '';
  halo.innerHTML = '';
  tickMarks = [];
  for (let i = 0; i < 60; i++) {
    const angle = -Math.PI / 2 + (i / 60) * TAU;
    const inner = i % 5 === 0 ? 308 : 324;
    const outer = 346;
    const a = polar(angle, inner);
    const b = polar(angle, outer);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x.toFixed(2));
    line.setAttribute('y1', a.y.toFixed(2));
    line.setAttribute('x2', b.x.toFixed(2));
    line.setAttribute('y2', b.y.toFixed(2));
    line.setAttribute('stroke-linecap', 'round');
    ticks.appendChild(line);
    tickMarks.push(line);
  }

  for (let i = 0; i < 3; i++) {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', String(250 + i * 38));
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke-width', String(1.5 - i * 0.25));
    halo.appendChild(circle);
  }
}

function buildParticles() {
  particlesGroup.innerHTML = '';
  particleNodes = [];
  for (let i = 0; i < 200; i++) {
    const node = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    node.setAttribute('r', String(1.4 + (i % 5) * 0.45));
    particlesGroup.appendChild(node);
    particleNodes.push(node);
  }
}

function applyTheme() {
  const selected = themes[themeInput.value];
  if (themeInput.value === 'custom') {
    selected.accent = accentInput.value;
    selected.accent2 = mixColor(accentInput.value, '#ffffff', 0.25);
    selected.accent3 = mixColor(accentInput.value, '#0f172a', 0.3);
  } else {
    accentInput.value = selected.accent;
  }

  background.setAttribute('fill', `url(#bgGradient)`);
  const stops = scene.querySelectorAll('#bgGradient stop');
  stops[0].setAttribute('stop-color', selected.bg0);
  stops[1].setAttribute('stop-color', selected.bg1);
  stops[2].setAttribute('stop-color', selected.bg2);

  halo.querySelectorAll('circle').forEach((circle, index) => {
    circle.setAttribute('stroke', rgba(index === 1 ? selected.accent2 : selected.accent, 0.1 + index * 0.04));
  });
  tickMarks.forEach((line, index) => {
    line.setAttribute('stroke', rgba(index % 5 === 0 ? selected.accent2 : selected.accent, index % 5 === 0 ? 0.85 : 0.36));
    line.setAttribute('stroke-width', index % 5 === 0 ? '3.4' : '1.6');
  });

  spiralPath.setAttribute('stroke', rgba(selected.accent, 0.72));
  hub.setAttribute('fill', selected.accent);
  hourHand.setAttribute('stroke', selected.accent2);
  hourHand.setAttribute('stroke-width', '13');
  minuteHand.setAttribute('stroke', selected.accent);
  minuteHand.setAttribute('stroke-width', '9');
  secondHand.setAttribute('stroke', selected.accent3);
  secondHand.setAttribute('stroke-width', '4');
  digitalOverlay.style.color = rgba(selected.accent, 0.95);
  digitalOverlay.style.borderColor = rgba(selected.accent, 0.2);
  digitalOverlay.style.background = rgba(selected.bg1, 0.65);
  accentValue.textContent = accentInput.value.toUpperCase();
  themeValue.textContent = themeInput.value.slice(0, 1).toUpperCase();
}

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  const size = Math.max(width, height);
  scene.setAttribute('viewBox', `0 0 ${size} ${size}`);
  background.setAttribute('width', String(size));
  background.setAttribute('height', String(size));
  document.getElementById('clockRoot').setAttribute('transform', `translate(${size / 2} ${size / 2}) scale(${size / 1000})`);
}

function buildSpiral(progress) {
  const points = [];
  for (let i = 0; i < 240; i++) {
    const t = i / 239;
    const radius = 20 + Math.pow(GOLDEN, t * 4.6) * 20;
    const angle = -Math.PI / 2 + t * TAU * (1.55 + progress * 0.1);
    const p = polar(angle, radius);
    points.push(`${i === 0 ? 'M' : 'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`);
  }
  spiralPath.setAttribute('d', points.join(' '));
}

function renderSegments(angleHour, angleMinute, angleSecond, theme) {
  segments.innerHTML = '';
  const values = [
    { angle: angleHour, size: 144, width: 22, color: theme.accent2 },
    { angle: angleMinute, size: 220, width: 18, color: theme.accent },
    { angle: angleSecond, size: 294, width: 10, color: theme.accent3 },
  ];

  values.forEach((value, index) => {
    if (index === 2 && !secondsInput.checked) {
      return;
    }
    const start = value.angle - 0.28;
    const end = value.angle + 0.28;
    const a = polar(start, value.size);
    const b = polar(end, value.size);
    const largeArc = end - start > Math.PI ? 1 : 0;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${a.x.toFixed(2)} ${a.y.toFixed(2)} A ${value.size} ${value.size} 0 ${largeArc} 1 ${b.x.toFixed(2)} ${b.y.toFixed(2)}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', value.color);
    path.setAttribute('stroke-width', String(value.width));
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('opacity', index === 2 ? '0.8' : '0.92');
    segments.appendChild(path);
  });
}

function renderParticles(angleHour, angleMinute, angleSecond, now, theme) {
  const targets = [];
  const hands = [
    { angle: angleHour, length: 148, count: 60, color: theme.accent2 },
    { angle: angleMinute, length: 236, count: 80, color: theme.accent },
  ];
  if (secondsInput.checked) {
    hands.push({ angle: angleSecond, length: 292, count: 60, color: theme.accent3 });
  }

  hands.forEach(hand => {
    for (let i = 0; i < hand.count; i++) {
      const t = i / Math.max(1, hand.count - 1);
      const sway = Math.sin(now * 0.002 + i * 0.38) * 6;
      const p = polar(hand.angle + Math.sin(now * 0.001 + i) * 0.02, 24 + t * hand.length + sway);
      targets.push({ x: p.x, y: p.y, color: hand.color, alpha: 0.28 + t * 0.72 });
    }
  });

  for (let i = 0; i < particleNodes.length; i++) {
    const node = particleNodes[i];
    const target = targets[i % targets.length];
    const orbit = polar(now * 0.0004 + i * 0.6, 12 + (i % 8) * 2);
    node.setAttribute('cx', (target.x + orbit.x * 0.12).toFixed(2));
    node.setAttribute('cy', (target.y + orbit.y * 0.12).toFixed(2));
    node.setAttribute('fill', target.color);
    node.setAttribute('opacity', target.alpha.toFixed(2));
  }
}

function renderGeometry(angleHour, angleMinute, angleSecond, now, theme) {
  geometry.innerHTML = '';
  const rings = [
    { radius: 128, points: 6, width: 7, color: theme.accent2, phase: angleHour },
    { radius: 210, points: 12, width: 5, color: theme.accent, phase: angleMinute },
  ];
  if (secondsInput.checked) {
    rings.push({ radius: 288, points: 18, width: 3.5, color: theme.accent3, phase: angleSecond });
  }

  rings.forEach((ring, ringIndex) => {
    const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const parts = [];
    for (let i = 0; i < ring.points; i++) {
      const t = i / ring.points;
      const pulse = 1 + Math.sin(now * 0.002 + t * TAU * 3 + ringIndex) * 0.08;
      const p = polar(ring.phase + t * TAU, ring.radius * pulse);
      parts.push(`${i === 0 ? 'M' : 'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`);
    }
    parts.push('Z');
    polygon.setAttribute('d', parts.join(' '));
    polygon.setAttribute('fill', rgba(ring.color, 0.06));
    polygon.setAttribute('stroke', ring.color);
    polygon.setAttribute('stroke-width', String(ring.width));
    polygon.setAttribute('stroke-linejoin', 'round');
    geometry.appendChild(polygon);
  });
}

function setVisibility(style) {
  spiralPath.style.display = style === 'spiral' ? 'block' : 'none';
  segments.style.display = style === 'spiral' ? 'block' : 'none';
  particlesGroup.style.display = style === 'particle' ? 'block' : 'none';
  geometry.style.display = style === 'geometry' ? 'block' : 'none';
  hands.style.display = style === 'particle' ? 'none' : 'block';
}

const hands = document.getElementById('hands');

function formatTime(date, showSeconds) {
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  const seconds = String(date.getSeconds()).padStart(2, '0');
  return showSeconds ? `${hours}:${minutes}:${seconds}` : `${hours}:${minutes}`;
}

function render(now) {
  const date = new Date();
  const ms = date.getMilliseconds() / 1000;
  const second = date.getSeconds();
  const minute = date.getMinutes() + (second + ms) / 60;
  const hour = (date.getHours() % 12) + minute / 60;
  const secondProgress = secondsInput.checked ? second + ms : date.getSeconds();

  if (second !== lastSecond) {
    lastSecond = second;
    tickPulse = 1;
    tickLabel.textContent = String(second).padStart(2, '0');
  }

  tickPulse *= 0.92;

  const angleHour = -Math.PI / 2 + (hour / 12) * TAU;
  const angleMinute = -Math.PI / 2 + (minute / 60) * TAU;
  const angleSecond = -Math.PI / 2 + (secondProgress / 60) * TAU;
  const theme = themes[themeInput.value];
  const timeText = formatTime(date, secondsInput.checked);

  const hourTip = polar(angleHour, 160 + tickPulse * 8);
  const minuteTip = polar(angleMinute, 240 + tickPulse * 10);
  const secondTip = polar(angleSecond, 290 + tickPulse * 18);

  hourHand.setAttribute('x2', hourTip.x.toFixed(2));
  hourHand.setAttribute('y2', hourTip.y.toFixed(2));
  minuteHand.setAttribute('x2', minuteTip.x.toFixed(2));
  minuteHand.setAttribute('y2', minuteTip.y.toFixed(2));
  secondHand.setAttribute('x2', secondTip.x.toFixed(2));
  secondHand.setAttribute('y2', secondTip.y.toFixed(2));
  secondHand.style.display = secondsInput.checked ? 'block' : 'none';

  halo.setAttribute('transform', `scale(${1 + tickPulse * 0.015})`);
  buildSpiral(ms);
  renderSegments(angleHour, angleMinute, angleSecond, theme);
  renderParticles(angleHour, angleMinute, angleSecond, now, theme);
  renderGeometry(angleHour, angleMinute, angleSecond, now, theme);
  setVisibility(styleInput.value);

  timeLabel.textContent = timeText;
  modeLabel.textContent = styleInput.value;
  digitalOverlay.textContent = timeText;
  digitalOverlay.classList.toggle('hidden', !digitalInput.checked);
  styleValue.textContent = String({ spiral: 1, particle: 2, geometry: 3 }[styleInput.value]);
  secondsValue.textContent = secondsInput.checked ? 'on' : 'off';
  digitalValue.textContent = digitalInput.checked ? 'on' : 'off';

  requestAnimationFrame(render);
}

themeInput.addEventListener('input', applyTheme);
accentInput.addEventListener('input', () => {
  themeInput.value = 'custom';
  applyTheme();
});
secondsInput.addEventListener('input', () => {
  secondsValue.textContent = secondsInput.checked ? 'on' : 'off';
});
digitalInput.addEventListener('input', () => {
  digitalValue.textContent = digitalInput.checked ? 'on' : 'off';
});
styleInput.addEventListener('input', () => {
  modeLabel.textContent = styleInput.value;
});
window.addEventListener('resize', resize);

buildTicks();
buildParticles();
resize();
applyTheme();
requestAnimationFrame(render);
</script>
</body>
</html>
