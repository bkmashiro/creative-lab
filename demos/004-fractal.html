<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>004 — Fractal Explorer · creative-lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: radial-gradient(circle at top, #131722 0%, #06070b 58%, #020305 100%);
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    .overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(8, 10, 16, 0.72);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      z-index: 2;
      min-width: 255px;
    }
    .overlay h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }
    .overlay p,
    .overlay .stats,
    .overlay .hint {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.78);
    }
    .stats {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 18px;
      margin: 10px 0 8px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .stats strong { color: #7dd3fc; font-weight: 500; }
    .hint { color: rgba(230, 237, 243, 0.62); }
    .footer {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="overlay">
  <h1>Mandelbrot Fractal Explorer</h1>
  <p>Mouse wheel zooms, drag pans, and <strong>C</strong> cycles palettes.</p>
  <div class="stats">
    <span>Palette</span><strong id="paletteLabel">Classic</strong>
    <span>Iterations</span><strong id="iterLabel">180</strong>
    <span>Zoom</span><strong id="zoomLabel">1.00×</strong>
  </div>
  <div class="hint">Smooth-color WebGL renderer with adaptive iterations.</div>
</div>

<div class="footer">
  <a href="https://github.com/bkmashiro/creative-lab">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com">cl.yuzhes.com</a>
</div>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', { antialias: false, preserveDrawingBuffer: false });

if (!gl) {
  document.body.innerHTML = '<div style="padding:24px;color:#fff;font-family:sans-serif">WebGL is required for this demo.</div>';
  throw new Error('WebGL unavailable');
}

const paletteLabel = document.getElementById('paletteLabel');
const iterLabel = document.getElementById('iterLabel');
const zoomLabel = document.getElementById('zoomLabel');

const palettes = ['Classic', 'Fire', 'Ocean', 'Grayscale', 'Psychedelic'];
const state = {
  centerX: -0.5,
  centerY: 0,
  scale: 3.2,
  palette: 0,
  maxIter: 180,
  dragging: false,
  lastX: 0,
  lastY: 0,
};

const vsSource = `
attribute vec2 aPos;
void main() {
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

const fsSource = `
precision highp float;

uniform vec2 uRes;
uniform vec2 uCenter;
uniform float uScale;
uniform float uPalette;
uniform float uMaxIter;

vec3 paletteClassic(float t) {
  return 0.5 + 0.5 * cos(6.28318 * (vec3(0.05, 0.15, 0.22) + t * vec3(1.0, 0.85, 0.75)));
}

vec3 paletteFire(float t) {
  vec3 a = vec3(0.07, 0.01, 0.0);
  vec3 b = vec3(1.0, 0.32, 0.04);
  vec3 c = vec3(1.0, 0.92, 0.38);
  return mix(mix(a, b, smoothstep(0.0, 0.5, t)), c, smoothstep(0.35, 1.0, t));
}

vec3 paletteOcean(float t) {
  vec3 deep = vec3(0.02, 0.06, 0.16);
  vec3 mid = vec3(0.0, 0.5, 0.78);
  vec3 foam = vec3(0.78, 0.98, 1.0);
  return mix(mix(deep, mid, smoothstep(0.0, 0.55, t)), foam, smoothstep(0.45, 1.0, t));
}

vec3 paletteGray(float t) {
  return vec3(pow(t, 0.85));
}

vec3 palettePsych(float t) {
  return 0.45 + 0.55 * cos(6.28318 * (vec3(0.92, 0.37, 0.14) + t * vec3(1.0, 1.4, 1.9)));
}

vec3 pickPalette(float index, float t) {
  if (index < 0.5) return paletteClassic(t);
  if (index < 1.5) return paletteFire(t);
  if (index < 2.5) return paletteOcean(t);
  if (index < 3.5) return paletteGray(t);
  return palettePsych(t);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes.xy) / uRes.y;
  vec2 c = uCenter + vec2(uv.x * uScale, -uv.y * uScale);
  vec2 z = vec2(0.0);
  float iter = 0.0;
  float maxIter = uMaxIter;
  float escaped = 0.0;

  for (int i = 0; i < 2048; i++) {
    if (float(i) >= maxIter) break;
    float x = z.x * z.x - z.y * z.y + c.x;
    float y = 2.0 * z.x * z.y + c.y;
    z = vec2(x, y);
    if (dot(z, z) > 256.0) {
      iter = float(i);
      escaped = 1.0;
      break;
    }
  }

  vec3 col = vec3(0.0);
  if (escaped > 0.5) {
    float logZn = log(dot(z, z)) * 0.5;
    float nu = log(logZn / log(2.0)) / log(2.0);
    float smoothIter = iter + 1.0 - nu;
    float t = clamp(smoothIter / maxIter, 0.0, 1.0);
    col = pickPalette(uPalette, pow(t, 0.82));
    col *= 0.85 + 0.25 * cos(6.28318 * (t + vec3(0.0, 0.1, 0.2)));
  }

  float vignette = 1.0 - dot(uv * 0.85, uv * 0.85) * 0.4;
  col *= clamp(vignette, 0.65, 1.0);
  col = pow(max(col, 0.0), vec3(0.92));
  gl_FragColor = vec4(col, 1.0);
}
`;

function compileShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader) || 'Shader compile failed');
  }
  return shader;
}

const program = gl.createProgram();
gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error(gl.getProgramInfoLog(program) || 'Program link failed');
}
gl.useProgram(program);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(program, 'uRes');
const uCenter = gl.getUniformLocation(program, 'uCenter');
const uScale = gl.getUniformLocation(program, 'uScale');
const uPalette = gl.getUniformLocation(program, 'uPalette');
const uMaxIter = gl.getUniformLocation(program, 'uMaxIter');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = `${window.innerWidth}px`;
  canvas.style.height = `${window.innerHeight}px`;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

function updateIterations() {
  const zoom = 3.2 / state.scale;
  state.maxIter = Math.max(180, Math.min(1600, Math.floor(180 + Math.log2(zoom) * 24)));
}

function updateOverlay() {
  const zoom = 3.2 / state.scale;
  paletteLabel.textContent = palettes[state.palette];
  iterLabel.textContent = String(state.maxIter);
  zoomLabel.textContent = `${zoom.toFixed(2)}×`;
}

function screenToComplex(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left - rect.width * 0.5) / rect.height;
  const y = (clientY - rect.top - rect.height * 0.5) / rect.height;
  return {
    x: state.centerX + x * state.scale,
    y: state.centerY - y * state.scale,
  };
}

canvas.addEventListener('mousedown', event => {
  state.dragging = true;
  state.lastX = event.clientX;
  state.lastY = event.clientY;
  canvas.classList.add('dragging');
});

window.addEventListener('mouseup', () => {
  state.dragging = false;
  canvas.classList.remove('dragging');
});

window.addEventListener('mousemove', event => {
  if (!state.dragging) return;
  const dy = event.clientY - state.lastY;
  const dx = event.clientX - state.lastX;
  const scalePerPixel = state.scale / canvas.getBoundingClientRect().height;
  state.centerX -= dx * scalePerPixel;
  state.centerY += dy * scalePerPixel;
  state.lastX = event.clientX;
  state.lastY = event.clientY;
});

canvas.addEventListener('wheel', event => {
  event.preventDefault();
  const before = screenToComplex(event.clientX, event.clientY);
  const zoomFactor = Math.exp(event.deltaY * 0.0014);
  state.scale = Math.max(0.00000015, Math.min(3.2, state.scale * zoomFactor));
  updateIterations();
  const after = screenToComplex(event.clientX, event.clientY);
  state.centerX += before.x - after.x;
  state.centerY += before.y - after.y;
  updateOverlay();
}, { passive: false });

window.addEventListener('keydown', event => {
  if (event.key.toLowerCase() === 'c') {
    state.palette = (state.palette + 1) % palettes.length;
    updateOverlay();
  }
  if (event.key.toLowerCase() === 'r') {
    state.centerX = -0.5;
    state.centerY = 0;
    state.scale = 3.2;
    updateIterations();
    updateOverlay();
  }
});

function render() {
  updateIterations();
  updateOverlay();
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform2f(uCenter, state.centerX, state.centerY);
  gl.uniform1f(uScale, state.scale);
  gl.uniform1f(uPalette, state.palette);
  gl.uniform1f(uMaxIter, state.maxIter);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize();
updateIterations();
updateOverlay();
render();
</script>
</body>
</html>
