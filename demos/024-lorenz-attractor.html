<!-- TITLE: 024 Lorenz Attractor -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>024 — Lorenz Attractor · creative-lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: radial-gradient(circle at top, #111827 0%, #04050b 58%, #020308 100%);
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 348px;
      max-width: calc(100vw - 32px);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.38);
      z-index: 2;
    }
    .panel h1 { font-size: 15px; margin-bottom: 8px; }
    .panel p, .panel label, .panel span, .panel button {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.84);
    }
    .controls {
      display: grid;
      grid-template-columns: 88px 1fr 60px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 10px;
    }
    input[type="range"] { width: 100%; accent-color: #7dd3fc; }
    button {
      width: 100%;
      min-height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #f8fafc;
      padding: 7px 10px;
      cursor: pointer;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .meta {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .meta strong { color: #7dd3fc; font-weight: 500; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <h1>Lorenz Attractor</h1>
  <p>The Lorenz system spirals through a projected 3D strange attractor while the camera slowly rotates, revealing chaotic structure through depth, hue, and persistence.</p>
  <div class="controls">
    <label for="sigma">Sigma</label>
    <input id="sigma" type="range" min="4" max="20" step="0.1" value="10">
    <span id="sigmaValue">10.0</span>

    <label for="rho">Rho</label>
    <input id="rho" type="range" min="12" max="40" step="0.1" value="28">
    <span id="rhoValue">28.0</span>

    <label for="beta">Beta</label>
    <input id="beta" type="range" min="1" max="4" step="0.01" value="2.67">
    <span id="betaValue">2.67</span>

    <label for="speed">Speed</label>
    <input id="speed" type="range" min="0.2" max="3" step="0.01" value="1">
    <span id="speedValue">1.00</span>
  </div>
  <div class="meta">
    <span>Points</span><strong id="pointsLabel">0</strong>
    <span>Rotation</span><strong id="rotationLabel">0.00</strong>
    <span>State</span><strong id="stateLabel">live</strong>
  </div>
  <div class="actions">
    <button id="resetBtn" type="button">Reset</button>
    <button id="pauseBtn" type="button">Pause</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sigmaInput = document.getElementById('sigma');
const rhoInput = document.getElementById('rho');
const betaInput = document.getElementById('beta');
const speedInput = document.getElementById('speed');
const pointsLabel = document.getElementById('pointsLabel');
const rotationLabel = document.getElementById('rotationLabel');
const stateLabel = document.getElementById('stateLabel');
const resetBtn = document.getElementById('resetBtn');
const pauseBtn = document.getElementById('pauseBtn');
const valueSpans = {
  sigma: document.getElementById('sigmaValue'),
  rho: document.getElementById('rhoValue'),
  beta: document.getElementById('betaValue'),
  speed: document.getElementById('speedValue')
};

let width = 0;
let height = 0;
let dpr = 1;
let points = [];
let state = { x: 0.01, y: 1, z: 1.05 };
let lastTime = performance.now();
let rotation = 0;
let paused = false;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function resetSystem() {
  points = [];
  state = {
    x: 0.01 + Math.random() * 0.02,
    y: 1 + Math.random() * 0.4,
    z: 1 + Math.random() * 0.4
  };
}

function project(point, angle) {
  const cosY = Math.cos(angle);
  const sinY = Math.sin(angle);
  const cosX = Math.cos(angle * 0.47 + 0.45);
  const sinX = Math.sin(angle * 0.47 + 0.45);
  const x1 = point.x * cosY - point.z * sinY;
  const z1 = point.x * sinY + point.z * cosY;
  const y2 = point.y * cosX - z1 * sinX;
  const z2 = point.y * sinX + z1 * cosX;
  const depth = 1 / (1 + Math.max(-140, z2 + 55) * 0.015);
  return {
    x: width * 0.5 + x1 * 9.5 * depth,
    y: height * 0.54 - y2 * 9.5 * depth,
    depth
  };
}

function step(dt) {
  const sigma = Number(sigmaInput.value);
  const rho = Number(rhoInput.value);
  const beta = Number(betaInput.value);
  const speed = Number(speedInput.value);
  const h = 0.008 * speed;
  const substeps = Math.max(1, Math.round(dt * 720));

  for (let i = 0; i < substeps; i++) {
    const dx = sigma * (state.y - state.x);
    const dy = state.x * (rho - state.z) - state.y;
    const dz = state.x * state.y - beta * state.z;
    state.x += dx * h;
    state.y += dy * h;
    state.z += dz * h;
    points.push({ x: state.x, y: state.y, z: state.z, age: 0 });
  }

  if (points.length > 4800) points.splice(0, points.length - 4800);
  for (const point of points) point.age += dt * 0.38;
}

function draw() {
  ctx.fillStyle = 'rgba(2, 4, 10, 0.08)';
  ctx.fillRect(0, 0, width, height);

  if (points.length < 2) return;
  ctx.lineCap = 'round';
  for (let i = 1; i < points.length; i++) {
    const a = project(points[i - 1], rotation);
    const b = project(points[i], rotation);
    const age = Math.min(1, points[i].age / 1.3);
    const hue = 185 + ((i / points.length) * 160 + rotation * 18) % 160;
    ctx.strokeStyle = `hsla(${hue}, 95%, ${65 - age * 25}%, ${0.16 + b.depth * 0.45})`;
    ctx.lineWidth = b.depth * 2.2;
    ctx.shadowBlur = 10 * b.depth;
    ctx.shadowColor = `hsla(${hue}, 95%, 68%, 0.35)`;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

function frame(now) {
  const dt = Math.min(0.033, (now - lastTime) / 1000);
  lastTime = now;
  if (!paused) {
    rotation += dt * 0.55;
    step(dt);
  }
  draw();
  pointsLabel.textContent = String(points.length);
  rotationLabel.textContent = rotation.toFixed(2);
  requestAnimationFrame(frame);
}

resetBtn.addEventListener('click', resetSystem);
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  stateLabel.textContent = paused ? 'paused' : 'live';
});
for (const input of [sigmaInput, rhoInput, betaInput, speedInput]) {
  input.addEventListener('input', () => {
    valueSpans[input.id].textContent = Number(input.value).toFixed(input === betaInput || input === speedInput ? 2 : 1);
  });
  valueSpans[input.id].textContent = Number(input.value).toFixed(input === betaInput || input === speedInput ? 2 : 1);
}
window.addEventListener('resize', resize);

resize();
resetSystem();
requestAnimationFrame(frame);
</script>
</body>
</html>
