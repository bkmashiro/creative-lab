<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#040 Fluid Dynamics — creative-lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0e8ff}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:16px;left:16px;z-index:10;background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 16px;min-width:225px;font-size:0.82rem}
h1{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#6a7a9a;margin-bottom:11px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row label{width:78px;color:#c0c8e0;flex-shrink:0;font-size:0.8rem}
.row input[type=range]{flex:1;accent-color:#7ec8ff;cursor:pointer}
.val{width:34px;text-align:right;color:#7ec8ff;font-size:0.74rem;font-variant-numeric:tabular-nums}
.btn-row{display:flex;gap:5px;margin-top:9px}
button{flex:1;background:rgba(126,200,255,0.1);border:1px solid rgba(126,200,255,0.22);color:#7ec8ff;border-radius:6px;padding:5px 4px;font-size:0.74rem;cursor:pointer;transition:background .15s}
button:hover{background:rgba(126,200,255,0.22)}
button.active{background:rgba(126,200,255,0.3);border-color:rgba(126,200,255,0.5)}
#hint{position:fixed;bottom:14px;left:16px;color:rgba(180,210,255,0.3);font-size:0.7rem}
footer{position:fixed;bottom:12px;right:16px;color:rgba(255,255,255,0.22);font-size:0.7rem}
footer a{color:rgba(255,255,255,0.3);text-decoration:none}
footer a:hover{color:rgba(255,255,255,0.6)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>040 · Fluid Dynamics</h1>
  <div class="row"><label>Vorticity</label><input type="range" id="s-vort" min="0" max="80" value="35"><span class="val" id="v-vort">35</span></div>
  <div class="row"><label>Dye decay</label><input type="range" id="s-dye" min="90" max="100" value="98"><span class="val" id="v-dye">0.98</span></div>
  <div class="row"><label>Vel decay</label><input type="range" id="s-vel" min="90" max="100" value="99"><span class="val" id="v-vel">0.99</span></div>
  <div class="row"><label>Pressure</label><input type="range" id="s-iter" min="5" max="50" value="25" step="5"><span class="val" id="v-iter">25</span></div>
  <div class="row"><label>Splat size</label><input type="range" id="s-splat" min="1" max="20" value="6"><span class="val" id="v-splat">6</span></div>
  <div class="btn-row">
    <button id="btn-clear">Clear</button>
    <button id="btn-auto">Auto</button>
    <button id="btn-pause">Pause</button>
  </div>
</div>
<div id="hint">Drag to add fluid · Auto for idle animation</div>
<footer><a href="https://github.com/bkmashiro/creative-lab">creative-lab</a> · demo 040</footer>
<script>
'use strict';
const canvas = document.getElementById('c');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

const gl = canvas.getContext('webgl2', {antialias:false, preserveDrawingBuffer:false});
if (!gl) { document.body.innerHTML='<p style="color:#f88;padding:2em">WebGL2 not supported in this browser.</p>'; throw 0; }
if (!gl.getExtension('EXT_color_buffer_float')) { document.body.innerHTML='<p style="color:#f88;padding:2em">EXT_color_buffer_float not available.</p>'; throw 0; }
const linFilter = gl.getExtension('OES_texture_float_linear') ? gl.LINEAR : gl.NEAREST;

// ── Resolution ────────────────────────────────────────────────────────────
const SIM = 256, DYE = 512;

// ── Params ────────────────────────────────────────────────────────────────
const P = { vorticity:35, dyeDiss:0.98, velDiss:0.99, iterations:25, splatR:6, auto:false, paused:false };

// ── Vertex shader (layout=0 forces aPos to loc 0) ────────────────────────
const VERT = `#version 300 es
layout(location=0) in vec2 aPos;
out vec2 vUV;
void main(){ vUV=aPos*.5+.5; gl_Position=vec4(aPos,0.,1.); }`;

// ── Fragment shaders ──────────────────────────────────────────────────────
const FRAG_ADVECT = `#version 300 es
precision highp float;
uniform sampler2D uVel, uSrc;
uniform vec2 uVelTS;
uniform float uDt, uDiss;
in vec2 vUV; out vec4 O;
void main(){
  vec2 v=texture(uVel,vUV).xy;
  vec2 p=clamp(vUV-uDt*v*uVelTS,vec2(0.),vec2(1.));
  O=uDiss*texture(uSrc,p);
}`;

const FRAG_DIV = `#version 300 es
precision highp float;
uniform sampler2D uVel;
uniform vec2 uTS;
in vec2 vUV; out vec4 O;
void main(){
  float L=texture(uVel,vUV-vec2(uTS.x,0.)).x;
  float R=texture(uVel,vUV+vec2(uTS.x,0.)).x;
  float B=texture(uVel,vUV-vec2(0.,uTS.y)).y;
  float T=texture(uVel,vUV+vec2(0.,uTS.y)).y;
  O=vec4(.5*(R-L+T-B),0.,0.,1.);
}`;

const FRAG_PRESSURE = `#version 300 es
precision highp float;
uniform sampler2D uP, uDiv;
uniform vec2 uTS;
in vec2 vUV; out vec4 O;
void main(){
  float L=texture(uP,vUV-vec2(uTS.x,0.)).x;
  float R=texture(uP,vUV+vec2(uTS.x,0.)).x;
  float B=texture(uP,vUV-vec2(0.,uTS.y)).x;
  float T=texture(uP,vUV+vec2(0.,uTS.y)).x;
  float d=texture(uDiv,vUV).x;
  O=vec4((L+R+T+B-d)*.25,0.,0.,1.);
}`;

const FRAG_GRAD = `#version 300 es
precision highp float;
uniform sampler2D uP, uVel;
uniform vec2 uTS;
in vec2 vUV; out vec4 O;
void main(){
  float L=texture(uP,vUV-vec2(uTS.x,0.)).x;
  float R=texture(uP,vUV+vec2(uTS.x,0.)).x;
  float B=texture(uP,vUV-vec2(0.,uTS.y)).x;
  float T=texture(uP,vUV+vec2(0.,uTS.y)).x;
  vec2 v=texture(uVel,vUV).xy-.5*vec2(R-L,T-B);
  O=vec4(v,0.,1.);
}`;

const FRAG_CURL = `#version 300 es
precision highp float;
uniform sampler2D uVel;
uniform vec2 uTS;
in vec2 vUV; out vec4 O;
void main(){
  float L=texture(uVel,vUV-vec2(uTS.x,0.)).y;
  float R=texture(uVel,vUV+vec2(uTS.x,0.)).y;
  float B=texture(uVel,vUV-vec2(0.,uTS.y)).x;
  float T=texture(uVel,vUV+vec2(0.,uTS.y)).x;
  O=vec4(.5*((R-L)-(T-B)),0.,0.,1.);
}`;

const FRAG_VORT = `#version 300 es
precision highp float;
uniform sampler2D uVel, uCurl;
uniform vec2 uTS;
uniform float uStr, uDt;
in vec2 vUV; out vec4 O;
void main(){
  float L=abs(texture(uCurl,vUV-vec2(uTS.x,0.)).x);
  float R=abs(texture(uCurl,vUV+vec2(uTS.x,0.)).x);
  float B=abs(texture(uCurl,vUV-vec2(0.,uTS.y)).x);
  float T=abs(texture(uCurl,vUV+vec2(0.,uTS.y)).x);
  float c=texture(uCurl,vUV).x;
  vec2 g=vec2(R-L,T-B);
  g/=length(g)+1e-5;
  vec2 v=texture(uVel,vUV).xy+uDt*uStr*c*vec2(-g.y,g.x);
  O=vec4(v,0.,1.);
}`;

const FRAG_SPLAT = `#version 300 es
precision highp float;
uniform sampler2D uTgt;
uniform vec2 uPt;
uniform vec3 uCol;
uniform float uR, uAsp;
in vec2 vUV; out vec4 O;
void main(){
  vec2 p=vUV-uPt; p.x*=uAsp;
  float d=exp(-dot(p,p)/uR);
  O=vec4(texture(uTgt,vUV).rgb+d*uCol,1.);
}`;

const FRAG_DISPLAY = `#version 300 es
precision highp float;
uniform sampler2D uDye;
in vec2 vUV; out vec4 O;
void main(){
  vec3 c=max(texture(uDye,vUV).rgb,vec3(0.));
  c=1.-exp(-c*1.4);
  O=vec4(c,1.);
}`;

// ── Compile / link ────────────────────────────────────────────────────────
function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); }
  return s;
}
function mkProg(frag) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, frag));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); }
  return p;
}

const prg = {
  advect:  mkProg(FRAG_ADVECT),
  div:     mkProg(FRAG_DIV),
  pressure:mkProg(FRAG_PRESSURE),
  grad:    mkProg(FRAG_GRAD),
  curl:    mkProg(FRAG_CURL),
  vort:    mkProg(FRAG_VORT),
  splat:   mkProg(FRAG_SPLAT),
  display: mkProg(FRAG_DISPLAY),
};

// ── Quad buffer ───────────────────────────────────────────────────────────
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function bindQuad() {
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
}

// ── FBO helpers ───────────────────────────────────────────────────────────
function mkFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, linFilter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, linFilter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo, w, h};
}

function mkPP(w, h) {
  let a = mkFBO(w, h), b = mkFBO(w, h), flip = false;
  return {
    get read() { return flip ? b : a; },
    get write() { return flip ? a : b; },
    swap() { flip = !flip; },
    ts: [1/w, 1/h], w, h
  };
}

// ── Sim buffers ───────────────────────────────────────────────────────────
let vel = mkPP(SIM, SIM);
let dye = mkPP(DYE, DYE);
let pres = mkPP(SIM, SIM);
let divBuf = mkPP(SIM, SIM);
let curlBuf = mkPP(SIM, SIM);

// ── Rendering helpers ─────────────────────────────────────────────────────
function renderTo(fbo, w, h) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.viewport(0, 0, w, h);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function clearFBO(f, w, h) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.viewport(0, 0, w, h);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
}

function bindTex(tex, unit) {
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex);
}

// ── Simulation step ───────────────────────────────────────────────────────
const simTS = [1/SIM, 1/SIM];

function step(dt) {
  bindQuad();

  // 1. Curl
  gl.useProgram(prg.curl);
  gl.uniform2fv(gl.getUniformLocation(prg.curl,'uTS'), simTS);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.curl,'uVel'), 0);
  renderTo(curlBuf.write.fbo, SIM, SIM);
  curlBuf.swap();

  // 2. Vorticity confinement
  gl.useProgram(prg.vort);
  gl.uniform2fv(gl.getUniformLocation(prg.vort,'uTS'), simTS);
  gl.uniform1f(gl.getUniformLocation(prg.vort,'uStr'), P.vorticity);
  gl.uniform1f(gl.getUniformLocation(prg.vort,'uDt'), dt);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.vort,'uVel'), 0);
  bindTex(curlBuf.read.tex, 1); gl.uniform1i(gl.getUniformLocation(prg.vort,'uCurl'), 1);
  renderTo(vel.write.fbo, SIM, SIM);
  vel.swap();

  // 3. Advect velocity
  gl.useProgram(prg.advect);
  gl.uniform2fv(gl.getUniformLocation(prg.advect,'uVelTS'), simTS);
  gl.uniform1f(gl.getUniformLocation(prg.advect,'uDt'), dt);
  gl.uniform1f(gl.getUniformLocation(prg.advect,'uDiss'), P.velDiss);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.advect,'uVel'), 0);
  bindTex(vel.read.tex, 1); gl.uniform1i(gl.getUniformLocation(prg.advect,'uSrc'), 1);
  renderTo(vel.write.fbo, SIM, SIM);
  vel.swap();

  // 4. Divergence
  gl.useProgram(prg.div);
  gl.uniform2fv(gl.getUniformLocation(prg.div,'uTS'), simTS);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.div,'uVel'), 0);
  renderTo(divBuf.write.fbo, SIM, SIM);
  divBuf.swap();

  // 5. Pressure solve (Jacobi)
  clearFBO(pres.read.fbo, SIM, SIM);
  clearFBO(pres.write.fbo, SIM, SIM);
  gl.useProgram(prg.pressure);
  gl.uniform2fv(gl.getUniformLocation(prg.pressure,'uTS'), simTS);
  bindTex(divBuf.read.tex, 1); gl.uniform1i(gl.getUniformLocation(prg.pressure,'uDiv'), 1);
  for (let i = 0; i < P.iterations; i++) {
    bindTex(pres.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.pressure,'uP'), 0);
    renderTo(pres.write.fbo, SIM, SIM);
    pres.swap();
  }

  // 6. Subtract pressure gradient
  gl.useProgram(prg.grad);
  gl.uniform2fv(gl.getUniformLocation(prg.grad,'uTS'), simTS);
  bindTex(pres.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.grad,'uP'), 0);
  bindTex(vel.read.tex, 1); gl.uniform1i(gl.getUniformLocation(prg.grad,'uVel'), 1);
  renderTo(vel.write.fbo, SIM, SIM);
  vel.swap();

  // 7. Advect dye
  gl.useProgram(prg.advect);
  gl.uniform2fv(gl.getUniformLocation(prg.advect,'uVelTS'), simTS);
  gl.uniform1f(gl.getUniformLocation(prg.advect,'uDt'), dt);
  gl.uniform1f(gl.getUniformLocation(prg.advect,'uDiss'), P.dyeDiss);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.advect,'uVel'), 0);
  bindTex(dye.read.tex, 1); gl.uniform1i(gl.getUniformLocation(prg.advect,'uSrc'), 1);
  renderTo(dye.write.fbo, DYE, DYE);
  dye.swap();
}

// ── Splat ─────────────────────────────────────────────────────────────────
function splat(px, py, vx, vy, col) {
  const asp = W / H;
  const r = (P.splatR / 100) * (P.splatR / 100) * 0.06;
  const ux = px / W, uy = 1 - py / H;

  bindQuad();
  gl.useProgram(prg.splat);
  gl.uniform2f(gl.getUniformLocation(prg.splat,'uPt'), ux, uy);
  gl.uniform1f(gl.getUniformLocation(prg.splat,'uR'), r);
  gl.uniform1f(gl.getUniformLocation(prg.splat,'uAsp'), asp);

  // velocity
  gl.uniform3f(gl.getUniformLocation(prg.splat,'uCol'), vx * 0.0006, vy * 0.0006, 0);
  bindTex(vel.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.splat,'uTgt'), 0);
  renderTo(vel.write.fbo, SIM, SIM); vel.swap();

  // dye
  gl.uniform3fv(gl.getUniformLocation(prg.splat,'uCol'), col);
  bindTex(dye.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.splat,'uTgt'), 0);
  renderTo(dye.write.fbo, DYE, DYE); dye.swap();
}

// ── Color helpers ─────────────────────────────────────────────────────────
function hsv(h, s, v) {
  const i = Math.floor(h * 6), f = h * 6 - i;
  const p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
  return [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i % 6];
}
let hue = Math.random();

// ── Input ─────────────────────────────────────────────────────────────────
let mouse = {down: false, x: 0, y: 0, px: 0, py: 0};

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  mouse.x = mouse.px = e.clientX;
  mouse.y = mouse.py = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!mouse.down) return;
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY;
  hue = (hue + 0.003) % 1;
  splat(mouse.x, mouse.y, mouse.x - mouse.px, mouse.y - mouse.py, hsv(hue, 1, 1));
});
canvas.addEventListener('mouseup', () => { mouse.down = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.down = true; mouse.x = mouse.px = t.clientX; mouse.y = mouse.py = t.clientY;
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = t.clientX; mouse.y = t.clientY;
  hue = (hue + 0.003) % 1;
  splat(mouse.x, mouse.y, mouse.x - mouse.px, mouse.y - mouse.py, hsv(hue, 1, 1));
}, {passive: false});
canvas.addEventListener('touchend', () => { mouse.down = false; });

// ── Auto mode ─────────────────────────────────────────────────────────────
let autoTimer = 0;
function autoSplat(dt) {
  autoTimer -= dt;
  if (autoTimer > 0) return;
  autoTimer = 0.6 + Math.random() * 0.8;
  hue = (hue + 0.07 + Math.random() * 0.15) % 1;
  const px = W * (0.15 + Math.random() * 0.7);
  const py = H * (0.15 + Math.random() * 0.7);
  const speed = 180 + Math.random() * 260;
  const angle = Math.random() * Math.PI * 2;
  splat(px, py, Math.cos(angle) * speed, Math.sin(angle) * speed, hsv(hue, 0.9, 1));
}

// ── Render loop ───────────────────────────────────────────────────────────
let last = 0;
function frame(now) {
  requestAnimationFrame(frame);
  if (P.paused) return;
  const dt = Math.min((now - last) / 1000, 0.017);
  last = now;

  if (P.auto) autoSplat(dt);

  step(dt);

  // Display
  bindQuad();
  gl.useProgram(prg.display);
  bindTex(dye.read.tex, 0); gl.uniform1i(gl.getUniformLocation(prg.display,'uDye'), 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// Fire a few initial splats so canvas isn't empty
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2;
  splat(W/2 + Math.cos(angle)*W*0.2, H/2 + Math.sin(angle)*H*0.2,
    Math.cos(angle+1.5)*300, Math.sin(angle+1.5)*300, hsv(i/5, 1, 1));
}

requestAnimationFrame(t => { last = t; requestAnimationFrame(frame); });

// ── Window resize ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ── UI ────────────────────────────────────────────────────────────────────
function slider(id, valId, scale, key) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    P[key] = scale ? v / 100 : v;
    vl.textContent = scale ? (v/100).toFixed(2) : v;
  });
}
slider('s-vort', 'v-vort', false, 'vorticity');
slider('s-dye',  'v-dye',  true,  'dyeDiss');
slider('s-vel',  'v-vel',  true,  'velDiss');
slider('s-iter', 'v-iter', false, 'iterations');
slider('s-splat','v-splat',false, 'splatR');

document.getElementById('btn-clear').addEventListener('click', () => {
  clearFBO(dye.read.fbo, DYE, DYE);
  clearFBO(dye.write.fbo, DYE, DYE);
  clearFBO(vel.read.fbo, SIM, SIM);
  clearFBO(vel.write.fbo, SIM, SIM);
});
document.getElementById('btn-auto').addEventListener('click', function() {
  P.auto = !P.auto;
  this.classList.toggle('active', P.auto);
});
document.getElementById('btn-pause').addEventListener('click', function() {
  P.paused = !P.paused;
  this.classList.toggle('active', P.paused);
  this.textContent = P.paused ? 'Resume' : 'Pause';
  if (!P.paused) last = performance.now();
});
</script>
</body>
</html>
