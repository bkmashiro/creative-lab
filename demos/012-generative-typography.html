<!-- TITLE: 012 Generative Typography -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>012 — Generative Typography · creative-lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: none; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 330px;
      max-width: calc(100vw - 32px);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.76);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.38);
      z-index: 2;
    }
    .panel h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .panel p,
    .panel label,
    .meta,
    input {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.8);
    }
    .controls {
      display: grid;
      grid-template-columns: 86px 1fr 54px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 10px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #7dd3fc;
    }
    input[type="text"] {
      grid-column: span 2;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 10px;
      color: #f8fafc;
      text-transform: uppercase;
    }
    .meta {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .meta strong { color: #7dd3fc; font-weight: 500; }
    .footer {
      position: fixed;
      right: 16px;
      bottom: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      font-family: monospace;
      z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <h1>Generative Typography</h1>
  <p>Sampled text pixels become a living particle field. The letters loosen into drifting noise, then spring back into place while your cursor pushes nearby particles outward.</p>
  <div class="controls">
    <label for="word">Word</label>
    <input id="word" type="text" maxlength="10" value="HELLO">

    <label for="count">Particles</label>
    <input id="count" type="range" min="400" max="2600" step="50" value="1400">
    <span id="countValue">1400</span>

    <label for="spring">Spring</label>
    <input id="spring" type="range" min="2" max="30" value="14">
    <span id="springValue">0.14</span>
  </div>
  <div class="meta">
    <span>Rendered</span><strong id="renderedLabel">0</strong>
    <span>Drift</span><strong id="driftLabel">0.00</strong>
    <span>Mouse</span><strong id="mouseLabel">idle</strong>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/bkmashiro/creative-lab">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com">cl.yuzhes.com</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wordInput = document.getElementById('word');
const countInput = document.getElementById('count');
const springInput = document.getElementById('spring');
const countValue = document.getElementById('countValue');
const springValue = document.getElementById('springValue');
const renderedLabel = document.getElementById('renderedLabel');
const driftLabel = document.getElementById('driftLabel');
const mouseLabel = document.getElementById('mouseLabel');

let width = 0;
let height = 0;
let dpr = 1;
let particles = [];
let fieldTargets = [];
let lastTime = performance.now();
const mouse = { x: -9999, y: -9999, active: false };
const sampler = document.createElement('canvas');
const samplerCtx = sampler.getContext('2d', { willReadFrequently: true });

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rebuildText();
}

function gradientColor(index, total) {
  const t = total <= 1 ? 0 : index / (total - 1);
  const a = [34, 211, 238];
  const b = [168, 85, 247];
  const r = Math.round(lerp(a[0], b[0], t));
  const g = Math.round(lerp(a[1], b[1], t));
  const c = Math.round(lerp(a[2], b[2], t));
  return `rgb(${r},${g},${c})`;
}

function buildTargets(word, targetCount) {
  sampler.width = width;
  sampler.height = height;
  samplerCtx.clearRect(0, 0, width, height);

  const text = (word.trim() || 'HELLO').toUpperCase().slice(0, 10);
  const fontSize = clamp(width / Math.max(3.4, text.length * 0.62), 96, height * 0.34);
  samplerCtx.fillStyle = '#ffffff';
  samplerCtx.textAlign = 'center';
  samplerCtx.textBaseline = 'middle';
  samplerCtx.font = `900 ${fontSize}px Inter, Arial Black, sans-serif`;
  samplerCtx.fillText(text, width * 0.5, height * 0.5);

  const image = samplerCtx.getImageData(0, 0, width, height).data;
  const step = clamp(Math.floor(Math.sqrt((width * height) / targetCount)), 4, 14);
  const samples = [];

  for (let y = 0; y < height; y += step) {
    for (let x = 0; x < width; x += step) {
      const alpha = image[(y * width + x) * 4 + 3];
      if (alpha > 80) {
        samples.push({
          x: x + (Math.random() - 0.5) * step * 0.8,
          y: y + (Math.random() - 0.5) * step * 0.8,
        });
      }
    }
  }

  if (samples.length > targetCount) {
    const stride = samples.length / targetCount;
    return Array.from({ length: targetCount }, (_, index) => samples[Math.floor(index * stride)]);
  }
  return samples;
}

function rebuildText() {
  const targetCount = Number(countInput.value);
  fieldTargets = buildTargets(wordInput.value, targetCount);
  const total = fieldTargets.length;
  particles = fieldTargets.map((target, index) => {
    const existing = particles[index];
    return {
      x: existing ? existing.x : target.x + (Math.random() - 0.5) * 180,
      y: existing ? existing.y : target.y + (Math.random() - 0.5) * 180,
      vx: existing ? existing.vx : (Math.random() - 0.5) * 2.2,
      vy: existing ? existing.vy : (Math.random() - 0.5) * 2.2,
      tx: target.x,
      ty: target.y,
      phase: Math.random() * Math.PI * 2,
      radius: 1.1 + Math.random() * 2.2,
      color: gradientColor(index, Math.max(1, total)),
    };
  });
  countValue.textContent = countInput.value;
  renderedLabel.textContent = String(total);
}

function drawBackground() {
  const gradient = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.max(width, height) * 0.55);
  gradient.addColorStop(0, '#101528');
  gradient.addColorStop(0.45, '#0a0d18');
  gradient.addColorStop(1, '#040404');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

function render(now) {
  const dt = Math.min(0.032, (now - lastTime) / 1000);
  lastTime = now;
  const spring = Number(springInput.value) / 100;
  let drift = 0;

  drawBackground();
  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const driftX = Math.cos(now * 0.00055 + p.phase) * 0.55;
    const driftY = Math.sin(now * 0.00072 + p.phase * 1.3) * 0.55;
    const ax = (p.tx - p.x) * spring + driftX;
    const ay = (p.ty - p.y) * spring + driftY;

    p.vx += ax * dt * 60;
    p.vy += ay * dt * 60;

    if (mouse.active) {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.hypot(dx, dy) || 0.001;
      const radius = 110;
      if (dist < radius) {
        const force = (1 - dist / radius) * 18;
        p.vx += (dx / dist) * force * dt * 60;
        p.vy += (dy / dist) * force * dt * 60;
      }
    }

    p.vx *= 0.92;
    p.vy *= 0.92;
    p.x += p.vx;
    p.y += p.vy;
    drift += Math.hypot(p.x - p.tx, p.y - p.ty);

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';

  if (mouse.active) {
    const ring = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 90);
    ring.addColorStop(0, 'rgba(255,255,255,0.18)');
    ring.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 90, 0, Math.PI * 2);
    ctx.fill();
  }

  driftLabel.textContent = (drift / Math.max(1, particles.length)).toFixed(2);
  mouseLabel.textContent = mouse.active ? `${Math.round(mouse.x)},${Math.round(mouse.y)}` : 'idle';

  requestAnimationFrame(render);
}

wordInput.addEventListener('input', () => {
  wordInput.value = wordInput.value.toUpperCase().replace(/[^A-Z0-9 ]/g, '').slice(0, 10);
  rebuildText();
});
countInput.addEventListener('input', rebuildText);
springInput.addEventListener('input', () => {
  springValue.textContent = (Number(springInput.value) / 100).toFixed(2);
});

canvas.addEventListener('pointermove', event => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = event.clientX - rect.left;
  mouse.y = event.clientY - rect.top;
  mouse.active = true;
});
canvas.addEventListener('pointerleave', () => {
  mouse.active = false;
});

window.addEventListener('resize', resize);

springValue.textContent = (Number(springInput.value) / 100).toFixed(2);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
