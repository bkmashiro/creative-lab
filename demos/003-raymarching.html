<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>003 — SDF Raymarching · creative-lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div style="position:fixed;bottom:12px;right:16px;font-family:monospace;font-size:11px;color:rgba(255,255,255,0.35);z-index:999">
  <a href="https://github.com/bkmashiro/creative-lab" style="color:inherit;text-decoration:none">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com" style="color:inherit;text-decoration:none">cl.yuzhes.com</a>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<p style="color:white;padding:40px">WebGL not supported</p>'; }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// ─── Vertex Shader ───────────────────────────────────────────────────────────
const vsSource = `
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

// ─── Fragment Shader (Raymarcher) ─────────────────────────────────────────────
const fsSource = `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform vec2  uRes;

// ── SDF primitives ────────────────────────────────────────────────────
float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

// Smooth minimum
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

// Rotation helpers
mat2 rot(float a) {
  float c = cos(a), s = sin(a);
  return mat2(c, -s, s, c);
}

// ── Scene SDF ─────────────────────────────────────────────────────────
float scene(vec3 p) {
  float t = uTime * 0.6;

  // Central sphere
  float sphere = sdSphere(p, 0.55);

  // Orbiting torus
  vec3 tp = p;
  tp.xz = rot(t) * tp.xz;
  tp.xy = rot(t * 0.7) * tp.xy;
  float torus = sdTorus(tp, vec2(0.9, 0.18));

  // Second smaller torus at different angle
  vec3 tp2 = p;
  tp2.yz = rot(t * 1.3 + 1.2) * tp2.yz;
  tp2.xz = rot(t * 0.4) * tp2.xz;
  float torus2 = sdTorus(tp2, vec2(0.7, 0.12));

  // Blend them together
  return smin(smin(sphere, torus, 0.12), torus2, 0.08);
}

// ── Normal estimation ──────────────────────────────────────────────────
vec3 calcNormal(vec3 p) {
  const float h = 0.0005;
  return normalize(vec3(
    scene(p + vec3(h,0,0)) - scene(p - vec3(h,0,0)),
    scene(p + vec3(0,h,0)) - scene(p - vec3(0,h,0)),
    scene(p + vec3(0,0,h)) - scene(p - vec3(0,0,h))
  ));
}

// ── Soft shadow ────────────────────────────────────────────────────────
float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
  float res = 1.0;
  float t = mint;
  for(int i = 0; i < 32; i++) {
    float h = scene(ro + rd * t);
    if(h < 0.001) return 0.0;
    res = min(res, k * h / t);
    t += clamp(h, 0.01, 0.3);
    if(t > maxt) break;
  }
  return clamp(res, 0.0, 1.0);
}

// ── Ambient occlusion ──────────────────────────────────────────────────
float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0;
  float sca = 1.0;
  for(int i = 0; i < 5; i++) {
    float h = 0.01 + 0.12 * float(i) / 4.0;
    float d = scene(pos + h * nor);
    occ += (h - d) * sca;
    sca *= 0.95;
  }
  return clamp(1.0 - 3.0 * occ, 0.0, 1.0);
}

// ── Raymarching ────────────────────────────────────────────────────────
float raymarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  for(int i = 0; i < 96; i++) {
    float d = scene(ro + rd * t);
    if(d < 0.0008) return t;
    if(t > 20.0) break;
    t += d * 0.9;
  }
  return -1.0;
}

// ── Main ───────────────────────────────────────────────────────────────
void main() {
  vec2 uv = (gl_FragCoord.xy - uRes * 0.5) / uRes.y;

  // Animated camera orbit
  float camT = uTime * 0.25;
  vec3 ro = vec3(cos(camT) * 3.2, 1.2 + sin(camT * 0.5) * 0.6, sin(camT) * 3.2);
  vec3 target = vec3(0.0);
  vec3 forward = normalize(target - ro);
  vec3 right = normalize(cross(vec3(0,1,0), forward));
  vec3 up = cross(forward, right);
  vec3 rd = normalize(forward + uv.x * right + uv.y * up);

  // Background: deep space gradient
  vec3 bgTop = vec3(0.02, 0.03, 0.12);
  vec3 bgBot = vec3(0.005, 0.01, 0.04);
  vec3 col = mix(bgBot, bgTop, uv.y + 0.5);

  float t = raymarch(ro, rd);

  if(t > 0.0) {
    vec3 pos = ro + rd * t;
    vec3 nor = calcNormal(pos);

    // Lights
    vec3 lightDir1 = normalize(vec3(1.5, 2.0, 1.0));
    vec3 lightDir2 = normalize(vec3(-1.0, 0.5, -1.5));
    vec3 lightCol1 = vec3(1.0, 0.92, 0.80);
    vec3 lightCol2 = vec3(0.3, 0.5, 1.0);

    // Shadows
    float sha1 = softShadow(pos + nor * 0.002, lightDir1, 0.02, 8.0, 16.0);
    float sha2 = softShadow(pos + nor * 0.002, lightDir2, 0.02, 8.0, 10.0);

    // AO
    float ao = calcAO(pos, nor);

    // Phong shading
    float diff1 = max(dot(nor, lightDir1), 0.0);
    float diff2 = max(dot(nor, lightDir2), 0.0);
    vec3 ref = reflect(rd, nor);
    float spec1 = pow(max(dot(ref, lightDir1), 0.0), 48.0);
    float spec2 = pow(max(dot(ref, lightDir2), 0.0), 28.0);

    // Material: iridescent metallic
    float fresnel = pow(1.0 - clamp(dot(-rd, nor), 0.0, 1.0), 3.0);
    vec3 baseCol = mix(
      vec3(0.12, 0.18, 0.55),
      vec3(0.55, 0.8, 1.0),
      fresnel
    );
    // Add some color variation by normal
    baseCol += vec3(nor.x * 0.08, nor.y * 0.05, nor.z * 0.12) * 0.5;

    vec3 ambient = baseCol * vec3(0.1, 0.12, 0.2) * ao;
    vec3 diffuse = baseCol * (diff1 * sha1 * lightCol1 + diff2 * sha2 * lightCol2 * 0.4) * ao;
    vec3 specular = (spec1 * sha1 * lightCol1 * 0.8 + spec2 * sha2 * lightCol2 * 0.4);

    col = ambient + diffuse + specular;

    // Rim light
    float rim = pow(1.0 - clamp(dot(nor, -rd), 0.0, 1.0), 4.0);
    col += rim * vec3(0.1, 0.3, 0.8) * 0.4;

    // Fog
    float fog = exp(-t * 0.06);
    col = mix(bgTop, col, fog);
  }

  // Vignette
  float vign = 1.0 - dot(uv * 1.2, uv * 1.2);
  col *= clamp(vign, 0.0, 1.0);

  // Tone map & gamma
  col = col / (col + 0.8);
  col = pow(max(col, 0.0), vec3(0.4545));

  gl_FragColor = vec4(col, 1.0);
}
`;

// ─── Shader compilation ───────────────────────────────────────────────────────
function compileShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(shader));
    return null;
  }
  return shader;
}

const vs = compileShader(gl.VERTEX_SHADER, vsSource);
const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(program));
}

// ─── Quad ─────────────────────────────────────────────────────────────────────
const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

const aPosLoc = gl.getAttribLocation(program, 'aPos');
gl.enableVertexAttribArray(aPosLoc);
gl.vertexAttribPointer(aPosLoc, 2, gl.FLOAT, false, 0, 0);

const uTimeLoc = gl.getUniformLocation(program, 'uTime');
const uResLoc  = gl.getUniformLocation(program, 'uRes');

gl.useProgram(program);

// ─── Render loop ──────────────────────────────────────────────────────────────
const start = performance.now();
function render() {
  const t = (performance.now() - start) / 1000;
  gl.uniform1f(uTimeLoc, t);
  gl.uniform2f(uResLoc, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
