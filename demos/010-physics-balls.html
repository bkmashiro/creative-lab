<!-- TITLE: 010 Physics Bouncing Balls -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>010 — Physics Bouncing Balls · creative-lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #e6edf3;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 320px;
      max-width: calc(100vw - 32px);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(10, 12, 16, 0.76);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.38);
      z-index: 2;
    }
    .panel h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .panel p,
    .panel label,
    .meta {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(230, 237, 243, 0.8);
    }
    .controls {
      display: grid;
      grid-template-columns: 78px 1fr 52px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 10px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #7dd3fc;
    }
    .meta {
      display: grid;
      grid-template-columns: auto auto;
      gap: 2px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .meta strong { color: #7dd3fc; font-weight: 500; }
    .footer {
      position: fixed;
      right: 16px;
      bottom: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      font-family: monospace;
      z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <h1>Physics Bouncing Balls</h1>
  <p>Verlet-based circles with gravity, wall constraints, and pairwise elastic collisions. Click anywhere to inject a new pastel orb with a random launch vector.</p>
  <div class="controls">
    <label for="gravity">Gravity</label>
    <input id="gravity" type="range" min="0" max="180" value="52">
    <span id="gravityValue">0.52</span>

    <label for="restitution">Bounce</label>
    <input id="restitution" type="range" min="60" max="100" value="92">
    <span id="restitutionValue">0.92</span>

    <label for="count">Balls</label>
    <input id="count" type="range" min="20" max="40" value="28">
    <span id="countValue">28</span>
  </div>
  <div class="meta">
    <span>Live balls</span><strong id="liveCountLabel">28</strong>
    <span>Kinetic</span><strong id="energyLabel">0.00</strong>
    <span>Collisions</span><strong id="collisionLabel">0</strong>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/bkmashiro/creative-lab">bkmashiro/creative-lab</a>
  · <a href="https://cl.yuzhes.com">cl.yuzhes.com</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const gravityInput = document.getElementById('gravity');
const restitutionInput = document.getElementById('restitution');
const countInput = document.getElementById('count');
const gravityValue = document.getElementById('gravityValue');
const restitutionValue = document.getElementById('restitutionValue');
const countValue = document.getElementById('countValue');
const liveCountLabel = document.getElementById('liveCountLabel');
const energyLabel = document.getElementById('energyLabel');
const collisionLabel = document.getElementById('collisionLabel');

let width = 0;
let height = 0;
let dpr = 1;
let balls = [];
let lastTime = performance.now();
let collisionCount = 0;

const pastelPalette = [
  '#f8b4d9', '#a5f3fc', '#c4b5fd', '#fde68a', '#fdba74',
  '#86efac', '#f9a8d4', '#bfdbfe', '#ddd6fe', '#fecdd3',
];

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function createBall(x = rand(40, width - 40), y = rand(40, height * 0.45), vx = rand(-4, 4), vy = rand(-1, 3)) {
  const radius = rand(8, 30);
  return {
    x,
    y,
    px: x - vx,
    py: y - vy,
    ax: 0,
    ay: 0,
    radius,
    mass: radius * radius,
    color: pastelPalette[(Math.random() * pastelPalette.length) | 0],
  };
}

function syncCount() {
  const target = Number(countInput.value);
  while (balls.length < target) balls.push(createBall());
  while (balls.length > target) balls.pop();
  countValue.textContent = String(target);
  liveCountLabel.textContent = String(balls.length);
}

function updateLabels() {
  gravityValue.textContent = (Number(gravityInput.value) / 100).toFixed(2);
  restitutionValue.textContent = (Number(restitutionInput.value) / 100).toFixed(2);
  countValue.textContent = countInput.value;
  liveCountLabel.textContent = String(balls.length);
}

function integrate(ball, dt, gravity) {
  const vx = ball.x - ball.px;
  const vy = ball.y - ball.py;
  ball.px = ball.x;
  ball.py = ball.y;
  ball.x += vx + ball.ax * dt * dt;
  ball.y += vy + (ball.ay + gravity) * dt * dt;
  ball.ax = 0;
  ball.ay = 0;
}

function solveWalls(ball, restitution) {
  let vx = ball.x - ball.px;
  let vy = ball.y - ball.py;

  if (ball.x + ball.radius > width) {
    ball.x = width - ball.radius;
    vx *= -restitution;
    ball.px = ball.x - vx;
  } else if (ball.x - ball.radius < 0) {
    ball.x = ball.radius;
    vx *= -restitution;
    ball.px = ball.x - vx;
  }

  if (ball.y + ball.radius > height) {
    ball.y = height - ball.radius;
    vy *= -restitution;
    vx *= 0.999;
    ball.py = ball.y - vy;
    ball.px = ball.x - vx;
  } else if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    vy *= -restitution;
    ball.py = ball.y - vy;
  }
}

function solveBallCollisions(restitution) {
  collisionCount = 0;
  for (let i = 0; i < balls.length; i++) {
    const a = balls[i];
    for (let j = i + 1; j < balls.length; j++) {
      const b = balls[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const minDist = a.radius + b.radius;
      const distSq = dx * dx + dy * dy;
      if (!distSq || distSq >= minDist * minDist) continue;

      const dist = Math.sqrt(distSq) || 0.0001;
      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist;
      const totalMass = a.mass + b.mass;
      const shiftA = overlap * (b.mass / totalMass);
      const shiftB = overlap * (a.mass / totalMass);

      a.x -= nx * shiftA;
      a.y -= ny * shiftA;
      b.x += nx * shiftB;
      b.y += ny * shiftB;

      let avx = a.x - a.px;
      let avy = a.y - a.py;
      let bvx = b.x - b.px;
      let bvy = b.y - b.py;
      const relVel = (bvx - avx) * nx + (bvy - avy) * ny;
      if (relVel < 0) {
        const impulse = (-(1 + restitution) * relVel) / ((1 / a.mass) + (1 / b.mass));
        avx -= (impulse / a.mass) * nx;
        avy -= (impulse / a.mass) * ny;
        bvx += (impulse / b.mass) * nx;
        bvy += (impulse / b.mass) * ny;
        a.px = a.x - avx;
        a.py = a.y - avy;
        b.px = b.x - bvx;
        b.py = b.y - bvy;
      }
      collisionCount++;
    }
  }
}

function drawBackground() {
  const gradient = ctx.createRadialGradient(width * 0.5, height * 0.45, 80, width * 0.5, height * 0.5, Math.max(width, height) * 0.8);
  gradient.addColorStop(0, '#101827');
  gradient.addColorStop(0.45, '#0c1120');
  gradient.addColorStop(1, '#050505');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

function drawBall(ball) {
  const vx = ball.x - ball.px;
  const vy = ball.y - ball.py;
  const speed = Math.hypot(vx, vy);
  const glow = ctx.createRadialGradient(ball.x - ball.radius * 0.35, ball.y - ball.radius * 0.4, ball.radius * 0.15, ball.x, ball.y, ball.radius * 1.35);
  glow.addColorStop(0, 'rgba(255,255,255,0.92)');
  glow.addColorStop(0.3, ball.color);
  glow.addColorStop(1, 'rgba(255,255,255,0.02)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius * 1.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.lineWidth = 1.2;
  ctx.strokeStyle = `rgba(255,255,255,${clamp(0.14 + speed * 0.02, 0.16, 0.4)})`;
  ctx.stroke();
}

function render(now) {
  const dt = Math.min(1.3, (now - lastTime) / (1000 / 60));
  lastTime = now;
  const gravity = Number(gravityInput.value) / 100;
  const restitution = Number(restitutionInput.value) / 100;

  drawBackground();

  for (const ball of balls) integrate(ball, dt, gravity);
  for (let i = 0; i < 2; i++) {
    solveBallCollisions(restitution);
    for (const ball of balls) solveWalls(ball, restitution);
  }

  let energy = 0;
  for (const ball of balls) {
    drawBall(ball);
    const vx = ball.x - ball.px;
    const vy = ball.y - ball.py;
    energy += Math.hypot(vx, vy);
  }

  energyLabel.textContent = (energy / Math.max(1, balls.length)).toFixed(2);
  collisionLabel.textContent = String(collisionCount);
  liveCountLabel.textContent = String(balls.length);

  requestAnimationFrame(render);
}

canvas.addEventListener('pointerdown', event => {
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  balls.push(createBall(x, y, rand(-8, 8), rand(-9, 1)));
  if (balls.length > 40) balls.shift();
  countInput.value = String(clamp(balls.length, 20, 40));
  syncCount();
  updateLabels();
});

gravityInput.addEventListener('input', updateLabels);
restitutionInput.addEventListener('input', updateLabels);
countInput.addEventListener('input', () => {
  syncCount();
  updateLabels();
});

window.addEventListener('resize', () => {
  resize();
  syncCount();
});

resize();
updateLabels();
syncCount();
requestAnimationFrame(render);
</script>
</body>
</html>
